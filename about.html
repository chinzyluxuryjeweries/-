<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>About Us - Chinzy Luxury Jeweries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC;     
            --surface-white: #FFFFFF; 
            --text-dark: #1A1A1A;     
            --accent-gold: #C5A059;   
            --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --brand-sz: 22px; 
            --sub-sz: 21px; 
        }

        * { box-sizing: border-box; }
        body { font-family: 'Work Sans', sans-serif; margin: 0; background: var(--bg-pearl); color: var(--text-dark); }

        /* --- HEADER REPLICA --- */
        header { background: var(--surface-white); position: sticky; top: 0; z-index: 2000; width: 100%; box-shadow: 0 2px 20px rgba(0,0,0,0.02); transition: var(--transition); }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; height: 80px; transition: var(--transition); }
        .brand-center img { height: var(--brand-sz); width: auto; }
        .nav-row { padding: 15px 5%; border-top: 1px solid #F0F0F0; display: flex; justify-content: center; align-items: center; transition: var(--transition); position: relative; }
        .nav-links { display: flex; gap: 30px; list-style: none; padding: 0; margin: 0; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-size: 0.85rem; font-weight: 300; text-transform: uppercase; letter-spacing: 1.5px; }
        .nav-links a.active { color: var(--accent-gold); font-weight: 500; border-bottom: 1px solid var(--accent-gold); }

        header.scrolled { transform: translateY(-80px); }
        .logo-peek { position: absolute; left: 5%; opacity: 0; transform: translateX(-15px); transition: 0.4s; }
        header.scrolled .logo-peek { opacity: 1; transform: translateX(0); }
        .logo-peek img { height: 18px; }
        header.scrolled .nav-links a { font-size: calc(0.85rem - 2px); }

        /* --- STORY LAYOUT --- */
        .story-hero { height: 60vh; background: url('products/prod5.jpg') center/cover; position: relative; display: flex; align-items: center; justify-content: center; }
        .story-hero::after { content:''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); }
        .story-hero h1 { color: white; font-family: 'Playfair Display'; font-size: 3rem; z-index: 1; font-weight: 400; }

        .story-text { padding: 80px 10%; max-width: 900px; margin: auto; text-align: center; }
        .story-text h2 { font-family: 'Playfair Display'; font-size: 2rem; margin-bottom: 30px; }
        .story-text p { line-height: 2; color: #555; font-size: 1.1rem; }

        @media (max-width: 380px) {
            :root { --brand-sz: 19px; --sub-sz: 18px; }
            .header-top { height: 70px; }
            header.scrolled { transform: translateY(-70px); }
            .story-hero h1 { font-size: 2rem; }
            .story-text { padding: 40px 5%; }
        }
    </style>
</head>
<body>
    <header id="main-header">
        <div class="header-top">
            <div class="date-box" id="live-date"></div>
            <div class="brand-center"><img src="brand/brandname.jpg" alt="CHINZY"></div>
            <div class="icons-right"><i class="fas fa-magnifying-glass"></i><i class="fas fa-shopping-cart"></i></div>
        </div>
        <nav class="nav-row">
            <div class="logo-peek"><img src="logo/logo.jpg" alt="L"></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html" class="active">About</a></li>
            </ul>
        </nav>
    </header>

    <div class="story-hero"><h1>Our Heritage</h1></div>

    <main class="story-text">
        <h2>Elegance Defined</h2>
        <p>Chinzy Luxury Jeweries was founded on the principle that luxury should be a personal experience. For years, we have sourced the finest materials to create pieces that tell a story of beauty, resilience, and timelessness.</p>
    </main>

    <script>
        window.onscroll = () => { document.getElementById('main-header').classList.toggle('scrolled', window.scrollY > 60); };
        setInterval(() => { document.getElementById('live-date').innerText = new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}); }, 1000);
    </script>
</body>
</html>
