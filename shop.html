<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop | CHINZY JEWERIES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Modak&family=Playfair+Display:wght@400&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC; --surface: #FFFFFF; --text: #1A1A1A; 
            --accent: #C5A059; --success: #2ecc71; --warning: #e67e22; --danger: #95a5a6;
            --transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            --brand-sz: 28px;
            --glow: 0 0 10px rgba(197, 160, 89, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Work Sans', sans-serif; margin: 0; background: var(--bg-pearl); overflow-x: hidden; }

        /* --- EDITORIAL HEADER --- */
        header { background: var(--surface); position: sticky; top: 0; z-index: 2000; width: 100%; transition: var(--transition); box-shadow: 0 2px 20px rgba(0,0,0,0.02); }
        .branding-area { display: flex; align-items: center; justify-content: center; padding: 5px 5%; height: 70px; transition: var(--transition); }
        .brand-text { font-family: 'Modak', cursive; font-size: var(--brand-sz); color: var(--text); white-space: nowrap; transition: var(--transition); letter-spacing: 1px; text-decoration: none; }
        .nav-hub { padding: 10px 5%; border-top: 1px solid #F0F0F0; display: flex; flex-direction: column; align-items: center; transition: var(--transition); }
        .nav-main-line { display: flex; justify-content: space-between; align-items: center; width: 100%; transition: var(--transition); }
        .nav-links { display: flex; gap: 20px; list-style: none; padding: 0; margin: 0; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.8rem; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; }
        .nav-links a.active { color: var(--accent); font-weight: 500; border-bottom: 1px solid var(--accent); }
        .hub-icon-wrap { position: relative; cursor: pointer; }
        .cart-count { position: absolute; top: -8px; right: -10px; background: var(--accent); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; font-weight: 600; }
        .icon-stack-line { display: flex; gap: 30px; height: 0; opacity: 0; overflow: hidden; transition: var(--transition); }

        header.scrolled .branding-area { height: 0; padding: 0; opacity: 0; pointer-events: none; }
        header.scrolled .nav-main-line .hub-icon-wrap, header.scrolled .nav-main-line .fa-magnifying-glass { display: none; }
        header.scrolled .nav-main-line { justify-content: center; }
        header.scrolled .icon-stack-line { height: 35px; opacity: 1; margin-top: 5px; overflow: visible; justify-content: center; align-items: center; }

        /* --- SHOP GRID --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 5%; }
        .card { background: white; border-radius: 4px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.02); text-align: center; padding-bottom: 12px; }
        .img-container { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .product-name-overlay {
            position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.85); padding: 4px 8px; border-radius: 3px; font-size: 0.65rem; font-weight: 500; text-transform: uppercase; color: var(--text); max-width: 80%; text-align: right; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .stock-overlay {
            position: absolute; bottom: 8px; right: 8px; background: rgba(255,255,255,0.9); padding: 4px 8px; border-radius: 4px; font-size: 0.55rem; font-weight: 600; text-transform: uppercase; box-shadow: var(--glow); border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .card p { color: var(--accent); font-weight: 500; font-size: 0.85rem; margin: 8px 0 8px 0; }
        .add-btn { background: var(--text); color: white; border: none; padding: 10px; width: 90%; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; border-radius: 2px; cursor: pointer; }
        .add-btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

        /* --- CART SIDEBAR --- */
        #cart-sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; height: 100%; background: white; z-index: 3000; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: 0.5s; display: flex; flex-direction: column; }
        #cart-sidebar.open { right: 0; }
        .cart-item { display: flex; align-items: center; gap: 12px; padding: 15px; border-bottom: 1px solid #f9f9f9; }
        .cart-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .cart-item-info { flex-grow: 1; }
        .remove-item { color: #ff7675; cursor: pointer; font-size: 0.8rem; padding: 5px; }

        /* --- ORDER MODAL --- */
        #order-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 5000; 
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        #order-modal.open { display: flex; }
        .modal-box { 
            background: white; padding: 30px; border-radius: 12px; 
            width: 85%; max-width: 380px; text-align: center;
        }
        .modal-box h3 { font-family: 'Playfair Display', serif; margin-top: 0; }
        .modal-box input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #eee; border-radius: 4px; font-family: 'Work Sans';
        }
        .submit-btn { 
            width: 100%; background: #1A1A1A; color: white; border: none; 
            padding: 15px; border-radius: 4px; font-weight: 600; cursor: pointer;
            text-transform: uppercase; margin-top: 10px;
        }

        .category-wrap { width: 100%; overflow-x: auto; white-space: nowrap; padding: 12px 5%; background: white; border-bottom: 1px solid #f0f0f0; }
        .cat-btn { display: inline-block; padding: 7px 18px; margin-right: 8px; font-size: 0.7rem; text-transform: uppercase; border: 1px solid #eee; border-radius: 20px; cursor: pointer; }
        .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        #search-panel { position: fixed; top: -100%; left: 0; width: 100%; background: white; z-index: 3000; padding: 40px 5%; transition: 0.5s; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #search-panel.active { top: 0; }
        .search-input { width: 100%; border: none; border-bottom: 2px solid var(--accent); font-size: 1.2rem; padding: 10px; outline: none; font-family: 'Work Sans'; text-align: center; text-transform: uppercase; }
        #search-results { max-height: 300px; overflow-y: auto; margin-top: 20px; }
        .search-res-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; cursor: pointer; }

        .whatsapp-float { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #25D366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 4000; text-decoration: none; }
        #toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 12px 30px; border-radius: 30px; font-size: 0.8rem; transition: 0.4s; z-index: 4000; }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

    <div id="search-panel">
        <input type="text" class="search-input" id="s-in" placeholder="Find your piece..." oninput="doSearch()">
        <div id="search-results"></div>
        <div style="text-align:center; margin-top:20px; cursor:pointer;" onclick="toggleSearch()"><i class="fas fa-times"></i> CLOSE</div>
    </div>

    <header id="main-header">
        <div class="branding-area"><a href="index.html" class="brand-text">CHINZY JEWERIES</a></div>
        <nav class="nav-hub">
            <div class="nav-main-line">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html" class="active">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
                <div class="hub-icon-wrap" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count sync-cart">0</span>
                </div>
            </div>
            <div class="icon-stack-line">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <div class="hub-icon-wrap" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count sync-cart">0</span>
                </div>
            </div>
        </nav>
    </header>

    <div id="toast">Added to Cart</div>
    <div class="category-wrap" id="cat-bar"><div class="cat-btn active" onclick="filterCat('All', this)">All</div></div>
    <main class="grid" id="shop-grid"></main>

    <div id="cart-sidebar">
        <div style="padding:20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="font-family:'Playfair Display'; margin:0;">Shopping Cart</h3>
            <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; font-size: 1.2rem;"></i>
        </div>
        <div id="cart-list" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="padding:20px; border-top:1px solid #eee;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:600;">
                <span>Subtotal:</span> <span id="cart-total">₦0</span>
            </div>
            <button style="width:100%; background:#25D366; color:white; border:none; padding:15px; font-weight:600; text-transform:uppercase; border-radius: 4px;" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <!-- COLLECT DETAILS MODAL -->
    <div id="order-modal">
        <div class="modal-box">
            <h3>Finalize Order</h3>
            <p style="font-size: 0.8rem; color: #666;">Enter your details to launch WhatsApp.</p>
            <input type="text" id="cust-name" placeholder="Full Name" required>
            <input type="tel" id="cust-phone" placeholder="Phone Number" required>
            <button class="submit-btn" onclick="logAndGo()">Submit & Open WhatsApp</button>
            <p onclick="closeModal()" style="font-size:0.75rem; color:#aaa; margin-top:15px; cursor:pointer;">Cancel</p>
        </div>
    </div>

    <a href="https://wa.me/2349057835662" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTgYE39QUtAj5Ewhjr4J8zbC_ZEknbMRJ5gp5V6wlBXWqa9mvbPf9qrmYnqkdR_rSvumbUhAp0F6ef/pub?gid=895459828&single=true&output=csv';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKjteSlEn7_MY-qGzV_a5b1GGwLfzizLgz4zq2gSy-DqkmNml7AWD5RJOOX7PLR9Rw/exec'; // PASTE YOUR URL HERE
        
        let inventory = [];
        let cart = JSON.parse(localStorage.getItem('chinzyCart')) || [];

        async function init() {
            try {
                const r = await fetch(CSV); const t = await r.text();
                inventory = t.split('\n').slice(1).map(l => {
                    const p = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (p.length < 7) return null;
                    return { n: p[1].replace(/"/g, ''), cat: p[6].trim(), p: p[3].trim(), img: p[4].trim(), stock: parseInt(p[5]) };
                }).filter(x => x);
                const cats = ['All', ...new Set(inventory.map(i => i.cat))];
                const bar = document.getElementById('cat-bar'); bar.innerHTML = '';
                cats.forEach(c => bar.innerHTML += `<div class="cat-btn ${c==='All'?'active':''}" onclick="filterCat('${c}', this)">${c}</div>`);
                renderShop(inventory); updateCartUI();
            } catch (e) { console.error("Sheet Load Failed"); }
        }

        function renderShop(data) {
            const grid = document.getElementById('shop-grid'); grid.innerHTML = '';
            data.forEach((item) => {
                let statusText = item.stock === 0 ? "Out of Stock" : (item.stock <= 5 ? "Few Remaining" : "In Stock");
                let statusColor = item.stock === 0 ? "#95a5a6" : (item.stock <= 5 ? "#e67e22" : "#2ecc71");
                let btnDisabled = item.stock === 0 ? "disabled" : "";
                grid.innerHTML += `<div class="card"><div class="img-container"><img src="${item.img}"><div class="product-name-overlay">${item.n}</div><div class="stock-overlay" style="color: ${statusColor}">${statusText}</div></div><p>₦${Number(item.p).toLocaleString()}</p><button class="add-btn" ${btnDisabled} onclick="addToCart('${item.n}', '${item.p}', '${item.img}')">${item.stock === 0 ? "Unavailable" : "Add to Cart"}</button></div>`;
            });
        }

        function addToCart(n, p, img) {
            const existing = cart.find(c => c.n === n);
            if (existing) { existing.qty++; } else { cart.push({ n, p, img, qty: 1 }); }
            saveCart(); const t = document.getElementById('toast'); t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function removeFromCart(index) { cart.splice(index, 1); saveCart(); }

        function saveCart() {
            localStorage.setItem('chinzyCart', JSON.stringify(cart));
            let totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            localStorage.setItem('cartCount', totalQty); updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list'); const totalEl = document.getElementById('cart-total');
            list.innerHTML = ''; let total = 0; let totalQty = 0;
            if (cart.length === 0) { list.innerHTML = `<div style="text-align:center; padding:40px; color:#999;">Your cart is empty</div>`;
            } else {
                cart.forEach((item, idx) => {
                    const itemTotal = Number(item.p) * item.qty; total += itemTotal; totalQty += item.qty;
                    list.innerHTML += `<div class="cart-item"><img src="${item.img}"><div class="cart-item-info"><h4 style="font-size:0.75rem; margin:0;">${item.n} <span style="color:var(--accent)">x${item.qty}</span></h4><span style="font-size:0.8rem; color:#888;">₦${itemTotal.toLocaleString()}</span></div><i class="fas fa-trash-can remove-item" onclick="removeFromCart(${idx})"></i></div>`;
                });
            }
            totalEl.innerText = `₦${total.toLocaleString()}`;
            document.querySelectorAll('.sync-cart').forEach(e => e.innerText = totalQty);
        }

        // --- THE "HIGH SPEED" LOGIC ---
        function checkout() {
            if(cart.length === 0) return alert("Your cart is empty!");
            document.getElementById('order-modal').classList.add('open');
        }

        function closeModal() { document.getElementById('order-modal').classList.remove('open'); }

        function logAndGo() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || !phone) return alert("Please fill in your details.");

            const totalValue = document.getElementById('cart-total').innerText;
            const orderSummary = cart.map(i => `${i.n} (x${i.qty})`).join(', ');

            // 1. Silent Log to Google Sheets (Background)
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, phone: phone, order: orderSummary, total: totalValue, date: new Date().toLocaleString() })
            }).catch(e => console.log("Log fail"));

            // 2. Instant WhatsApp Launch (Foreground)
            let msg = `Hello Chinzy Luxury, I am ${name}.\n\nI'd like to order:\n`;
            cart.forEach(i => msg += `• ${i.n} (x${i.qty}) - ₦${(Number(i.p)*i.qty).toLocaleString()}\n`);
            msg += `\nTotal: ${totalValue}\nPhone: ${phone}`;
            
            window.open(`https://wa.me/2349057835662?text=${encodeURIComponent(msg)}`);
            closeModal();
        }

        function toggleSearch() { document.getElementById('search-panel').classList.toggle('active'); }
        function doSearch() {
            const q = document.getElementById('s-in').value.toLowerCase();
            const res = document.getElementById('search-results'); res.innerHTML = ''; if(!q) return;
            inventory.filter(i => i.n.toLowerCase().includes(q)).forEach(i => {
                const div = document.createElement('div'); div.className = 'search-res-item';
                div.innerHTML = `<span>${i.n}</span><b>₦${Number(i.p).toLocaleString()}</b>`;
                div.onclick = () => { toggleSearch(); renderShop(inventory.filter(item => item.n === i.n)); };
                res.appendChild(div);
            });
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }
        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderShop(cat === 'All' ? inventory : inventory.filter(i => i.cat === cat));
        }

        window.onscroll = () => { document.getElementById('main-header').classList.toggle('scrolled', window.scrollY > 50); };
        init();
    </script>
</body>
</html>
