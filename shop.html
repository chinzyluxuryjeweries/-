<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Chinzy Luxury Jeweries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC;     
            --surface-white: #FFFFFF; 
            --text-dark: #1A1A1A;     
            --accent-gold: #C5A059;   
            --gold-glow: rgba(197, 160, 89, 0.15); 
            --border-radius: 4px;     
        }

        body { font-family: 'Work Sans', sans-serif; margin: 0; background-color: var(--bg-pearl); color: var(--text-dark); }

        /* --- HEADER (Matching Home) --- */
        header { background-color: var(--surface-white); box-shadow: 0 2px 20px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 1000; }
        .header-bottom { display: flex; justify-content: flex-end; align-items: center; padding: 15px 40px; border-top: 1px solid #F0F0F0; position: relative; text-transform: uppercase; }
        .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 35px; list-style: none; padding: 0; margin: 0; }
        .nav-links li a { text-decoration: none; color: var(--text-dark); font-weight: 300; font-size: 0.95rem; letter-spacing: 2px; }
        .nav-links li a.active { color: var(--accent-gold); font-weight: 400; }
        .action-icons { display: flex; align-items: center; gap: 25px; }

        /* --- SHOP SPECIFIC --- */
        .shop-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .page-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; }
        
        .category-filters { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1px; }
        .filter-btn { background: none; border: 1px solid #ddd; padding: 8px 20px; cursor: pointer; font-family: 'Work Sans'; font-weight: 300; transition: 0.3s; }
        .filter-btn.active { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--surface-white); padding: 15px; border: 1px solid #eee; text-align: center; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px var(--gold-glow); }
        .product-card img { width: 100%; height: 300px; object-fit: cover; margin-bottom: 15px; }
        .product-card h3 { font-family: 'Playfair Display'; font-weight: 400; margin: 10px 0; }
        .price { color: var(--accent-gold); font-size: 1.2rem; margin-bottom: 15px; }
        
        .buy-btn { background: var(--text-dark); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .buy-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* --- CART MODAL --- */
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <header>
        <div class="header-bottom">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li><a href="services.html">Services</a></li>
            </ul>
            <div class="action-icons">
                <div class="cart-wrapper" onclick="openCart()">
                    <i class="fas fa-shopping-cart"></i> (<span id="cart-count">0</span>)
                </div>
            </div>
        </div>
    </header>

    <div class="shop-container">
        <h1 class="page-title">Our Collection</h1>
        <div class="category-filters" id="filters">
            <button class="filter-btn active" onclick="filterBy('All')">All</button>
            <button class="filter-btn" onclick="filterBy('Necklaces')">Necklaces</button>
            <button class="filter-btn" onclick="filterBy('Bracelets')">Bracelets</button>
            <button class="filter-btn" onclick="filterBy('Watches')">Watches</button>
        </div>

        <div class="product-grid" id="product-display">
            <!-- Loaded from Sheets -->
        </div>
    </div>

    <div id="cart-modal">
        <div class="modal-content">
            <h2>Your Selection</h2>
            <div id="cart-items"></div>
            <h3 id="cart-total"></h3>
            <div id="checkout-form" style="display:none;">
                <input type="text" id="cust-name" placeholder="Full Name">
                <input type="email" id="cust-email" placeholder="Email">
                <button class="buy-btn" onclick="checkout()">WhatsApp Order</button>
            </div>
            <button onclick="closeCart()" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px;">Close</button>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTgYE39QUtAj5Ewhjr4J8zbC_ZEknbMRJ5gp5V6wlBXWqa9mvbPf9qrmYnqkdR_rSvumbUhAp0F6ef/pub?gid=895459828&single=true&output=csv';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZquSe37kjZGZuzy3KUINu7tFn41CMoHa0r5_0T_tHS18BsCQ-p85dDDcpcYITN-F7/exec';
        const PHONE = '2349057835662';

        let products = [];
        let cart = [];

        async function init() {
            const resp = await fetch(SHEET_URL);
            const csv = await resp.text();
            const rows = csv.split('\n').slice(1);
            
            products = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(c.length < 7) return null;
                return { id: c[0].trim(), name: c[1].trim(), desc: c[2].trim(), price: parseFloat(c[3]), qty: parseInt(c[4]), category: c[6].trim() };
            }).filter(p => p !== null);

            render('All');
        }

        function render(cat) {
            const display = document.getElementById('product-display');
            display.innerHTML = '';
            const filtered = cat === 'All' ? products : products.filter(p => p.category === cat);

            filtered.forEach(p => {
                display.innerHTML += `
                    <div class="product-card">
                        <img src="images/${p.id}.jpg" onerror="this.src='https://via.placeholder.com/300?text=${p.id}'">
                        <h3>${p.name}</h3>
                        <p class="price">₦${p.price.toLocaleString()}</p>
                        <button class="buy-btn" ${p.qty <= 0 ? 'disabled' : ''} onclick="addToCart('${p.id}')">
                            ${p.qty <= 0 ? 'Out of Stock' : 'Add to Cart'}
                        </button>
                    </div>
                `;
            });
        }

        function filterBy(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render(cat);
        }

        function addToCart(id) {
            const p = products.find(item => item.id === id);
            cart.push(p);
            document.getElementById('cart-count').innerText = cart.length;
            alert(p.name + " added!");
        }

        function openCart() {
            const list = document.getElementById('cart-items');
            const total = document.getElementById('cart-total');
            if(cart.length === 0) { list.innerHTML = "Cart is empty."; return; }
            
            let sum = 0;
            list.innerHTML = cart.map(i => {
                sum += i.price;
                return `<div class="cart-item"><span>${i.name}</span><span>₦${i.price.toLocaleString()}</span></div>`;
            }).join('');
            total.innerText = "Total: ₦" + sum.toLocaleString();
            document.getElementById('checkout-form').style.display = 'block';
            document.getElementById('cart-modal').style.display = 'flex';
        }

        function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }

        async function checkout() {
            const name = document.getElementById('cust-name').value;
            const email = document.getElementById('cust-email').value;
            if(!name || !email) return alert("Fill details");

            let order = cart.map(i => `${i.name} - ₦${i.price.toLocaleString()}`).join('\n');
            let total = "Total: ₦" + cart.reduce((a, b) => a + b.price, 0).toLocaleString();
            let msg = `Hi, I am ${name}. I want to buy:\n${order}\n${total}`;

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ name, email, order: msg }) });
            window.location.href = `https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`;
        }

        init();
    </script>
</body>
</html>
