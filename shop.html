<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Chinzy Luxury Jeweries</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC;     
            --surface-white: #FFFFFF; 
            --text-dark: #1A1A1A;     
            --accent-gold: #C5A059;   
            --gold-glow: rgba(197, 160, 89, 0.15); 
            --border-radius: 4px;     
            --transition-speed: 0.4s;
        }

        body { font-family: 'Work Sans', sans-serif; margin: 0; background-color: var(--bg-pearl); color: var(--text-dark); overflow-x: hidden; }

        /* --- SHARED HEADER STYLES --- */
        header { background-color: var(--surface-white); box-shadow: 0 2px 20px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 1000; transition: all var(--transition-speed) ease; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; transition: all var(--transition-speed) ease; }
        .header-left img { height: 55px; width: auto; transition: height var(--transition-speed) ease; }
        .header-center { text-align: center; flex-grow: 1; }
        .header-center img { height: 45px; width: auto; transition: height var(--transition-speed) ease; }
        .header-right { text-align: right; min-width: 150px; }
        #datetime-display { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 1.5px; }

        .header-bottom { display: flex; justify-content: flex-end; align-items: center; padding: 15px 40px; border-top: 1px solid #F0F0F0; position: relative; text-transform: uppercase; }
        .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 35px; list-style: none; padding: 0; margin: 0; align-items: center; }
        .nav-links li a { text-decoration: none; color: var(--text-dark); font-weight: 300; font-size: 0.95rem; letter-spacing: 2px; transition: color 0.3s; }
        .nav-links li a:hover, .nav-links li a.active { color: var(--accent-gold); }
        
        /* Dropdown */
        .dropdown-parent { position: relative; }
        .dropdown { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: var(--surface-white); box-shadow: 0 10px 25px rgba(0,0,0,0.05); list-style: none; padding: 15px 0; border: 1px solid #F0F0F0; min-width: 180px; }
        .dropdown-parent:hover .dropdown { display: block; }
        .dropdown li a { display: block; padding: 10px 20px; font-size: 0.85rem; }

        .action-icons { display: flex; align-items: center; gap: 25px; }
        .cart-wrapper { cursor: pointer; font-weight: 300; letter-spacing: 1px; transition: color 0.3s; }
        .cart-wrapper:hover { color: var(--accent-gold); }

        /* --- SHOP CONTENT --- */
        .shop-container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .page-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 400; margin-bottom: 40px; }
        
        .category-filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap; }
        .filter-btn { background: none; border: 1px solid #EAEAEA; padding: 10px 25px; cursor: pointer; font-family: 'Work Sans'; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 300; transition: 0.3s; }
        .filter-btn.active { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        .product-card { background: var(--surface-white); padding: 15px; text-align: center; transition: 0.4s; border: 1px solid transparent; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px var(--gold-glow); border-color: #F0F0F0; }
        .product-card img { width: 100%; height: 350px; object-fit: cover; margin-bottom: 20px; transition: 0.4s; }
        .product-card h3 { font-family: 'Playfair Display'; font-weight: 400; font-size: 1.4rem; margin: 10px 0; }
        .price { color: var(--accent-gold); font-size: 1.2rem; font-weight: 400; margin-bottom: 20px; }
        
        .buy-btn { background: var(--text-dark); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; transition: 0.3s; }
        .buy-btn:hover:not(:disabled) { background: var(--accent-gold); }
        .buy-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* --- MODAL --- */
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; position: relative; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 0.9rem; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Work Sans'; }

        /* Scrolled Header */
        header.scrolled .header-top { display: none; }
        header.scrolled .header-bottom { padding: 10px 40px; }
        .scrolled-brand { display: none; height: 30px; position: absolute; left: 40px; }
        header.scrolled .scrolled-brand { display: block; }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <div class="header-left"><img src="logo/logo.jpg" alt="Logo"></div>
            <div class="header-center"><img src="brand/brandname.jpg" alt="Brand"></div>
            <div class="header-right"><span id="datetime-display"></span></div>
        </div>
        <div class="header-bottom">
            <img class="scrolled-brand" src="brand/brandname.jpg" alt="Brand">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li class="dropdown-parent">
                    <a href="#">More <i class="fas fa-chevron-down" style="font-size: 0.7em;"></i></a>
                    <ul class="dropdown">
                        <li><a href="services.html">Services</a></li>
                        <li><a href="about.html">About Us</a></li>
                    </ul>
                </li>
            </ul>
            <div class="action-icons">
                <div class="cart-wrapper" onclick="openCart()">
                    <i class="fas fa-shopping-cart"></i> (<span id="cart-count">0</span>)
                </div>
            </div>
        </div>
    </header>

    <div class="shop-container">
        <h1 class="page-title">Our Collection</h1>
        <div class="category-filters" id="filters">
            <button class="filter-btn active" onclick="filterBy('All')">All</button>
            <button class="filter-btn" onclick="filterBy('Necklaces')">Necklaces</button>
            <button class="filter-btn" onclick="filterBy('Bracelets')">Bracelets</button>
            <button class="filter-btn" onclick="filterBy('Watches')">Watches</button>
        </div>
        <div class="product-grid" id="product-display"></div>
    </div>

    <div id="cart-modal">
        <div class="modal-content">
            <h2 style="font-family: 'Playfair Display'; font-weight: 400;">Your Selection</h2>
            <div id="cart-items"></div>
            <h3 id="cart-total" style="text-align: right; color: var(--accent-gold);"></h3>
            <div id="checkout-form" style="display:none;">
                <input type="text" id="cust-name" placeholder="Full Name" required>
                <input type="email" id="cust-email" placeholder="Email Address" required>
                <button class="buy-btn" onclick="checkout()">Submit & Chat on WhatsApp</button>
            </div>
            <button onclick="closeCart()" style="background:none; border:none; color:#999; cursor:pointer; margin-top:20px; text-transform:uppercase; font-size:0.7rem; letter-spacing:1px;">Close</button>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTgYE39QUtAj5Ewhjr4J8zbC_ZEknbMRJ5gp5V6wlBXWqa9mvbPf9qrmYnqkdR_rSvumbUhAp0F6ef/pub?gid=895459828&single=true&output=csv';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZquSe37kjZGZuzy3KUINu7tFn41CMoHa0r5_0T_tHS18BsCQ-p85dDDcpcYITN-F7/exec';
        const PHONE = '2349057835662';

        let products = [];
        let cart = [];

        async function init() {
            try {
                const resp = await fetch(SHEET_URL);
                const csv = await resp.text();
                const rows = csv.split('\n').slice(1);
                
                products = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(c.length < 7) return null;
                    return { 
                        id: c[0].trim(), 
                        name: c[1].replace(/^"|"$/g, '').trim(), 
                        price: parseFloat(c[3]), 
                        qty: parseInt(c[4]), 
                        category: c[6].replace(/^"|"$/g, '').trim() 
                    };
                }).filter(p => p !== null);

                render('All');
            } catch (e) { console.error("Error loading products", e); }
        }

        function render(cat) {
            const display = document.getElementById('product-display');
            display.innerHTML = '';
            const filtered = cat === 'All' ? products : products.filter(p => p.category.toLowerCase() === cat.toLowerCase());

            filtered.forEach(p => {
                // CORRECTED PATH: images/p001.jpg
                const imgPath = `images/${p.id.toLowerCase()}.jpg`;
                display.innerHTML += `
                    <div class="product-card">
                        <img src="${imgPath}" onerror="this.src='https://via.placeholder.com/350x450?text=${p.name}'">
                        <h3>${p.name}</h3>
                        <p class="price">₦${p.price.toLocaleString()}</p>
                        <button class="buy-btn" ${p.qty <= 0 ? 'disabled' : ''} onclick="addToCart('${p.id}')">
                            ${p.qty <= 0 ? 'Out of Stock' : 'Add to Cart'}
                        </button>
                    </div>
                `;
            });
        }

        function filterBy(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render(cat);
        }

        function addToCart(id) {
            const p = products.find(item => item.id === id);
            cart.push(p);
            document.getElementById('cart-count').innerText = cart.length;
            alert(p.name + " added to your cart!");
        }

        function openCart() {
            const list = document.getElementById('cart-items');
            const total = document.getElementById('cart-total');
            const modal = document.getElementById('cart-modal');
            if(cart.length === 0) { alert("Your cart is empty!"); return; }
            
            let sum = 0;
            list.innerHTML = cart.map(i => {
                sum += i.price;
                return `<div class="cart-item"><span>${i.name}</span><span>₦${i.price.toLocaleString()}</span></div>`;
            }).join('');
            total.innerText = "Total: ₦" + sum.toLocaleString();
            document.getElementById('checkout-form').style.display = 'block';
            modal.style.display = 'flex';
        }

        function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }

        async function checkout() {
            const name = document.getElementById('cust-name').value;
            const email = document.getElementById('cust-email').value;
            if(!name || !email) return alert("Please provide your name and email.");

            let order = cart.map(i => `- ${i.name}: ₦${i.price.toLocaleString()}`).join('\n');
            let totalVal = cart.reduce((a, b) => a + b.price, 0);
            let summary = `Order Summary:\n${order}\n\nTotal: ₦${totalVal.toLocaleString()}`;
            let whatsappMsg = `Hi, I'm ${name}.\nI'm interested in purchasing:\n\n${summary}\n\nPlease reach out to me at ${email}.`;

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ name, email, order: summary }) });
                window.location.href = `https://wa.me/${PHONE}?text=${encodeURIComponent(whatsappMsg)}`;
            } catch (e) { alert("Submission error, but you can still chat on WhatsApp!"); }
        }

        // Header and Time Logic
        function updateTime() {
            const now = new Date();
            document.getElementById('datetime-display').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ' | ' + now.toLocaleDateString();
        }
        setInterval(updateTime, 1000); updateTime();

        window.addEventListener('scroll', () => {
            const head = document.getElementById('main-header');
            if (window.scrollY > 50) head.classList.add('scrolled');
            else head.classList.remove('scrolled');
        });

        init();
    </script>
</body>
</html>
