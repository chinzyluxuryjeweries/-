<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Chinzy Luxury Jeweries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC;     
            --surface-white: #FFFFFF; 
            --text-dark: #1A1A1A;     
            --text-muted: #666666;
            --accent-gold: #C5A059;   
            --gold-glow: rgba(197, 160, 89, 0.15); 
            --transition-speed: 0.4s;
        }

        body { font-family: 'Work Sans', sans-serif; margin: 0; background-color: var(--bg-pearl); color: var(--text-dark); overflow-x: hidden; }

        header { background-color: var(--surface-white); box-shadow: 0 2px 20px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 1000; transition: all var(--transition-speed) ease; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }
        .header-center img { height: 45px; }
        .header-left img { height: 55px; }
        #datetime-display { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }

        .header-bottom { display: flex; justify-content: flex-end; align-items: center; padding: 15px 40px; border-top: 1px solid #F0F0F0; position: relative; text-transform: uppercase; }
        .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 35px; list-style: none; padding: 0; margin: 0; align-items: center; }
        .nav-links li a { text-decoration: none; color: var(--text-dark); font-weight: 300; font-size: 0.95rem; letter-spacing: 2px; }
        
        .action-icons { display: flex; align-items: center; gap: 25px; }

        /* Search Bar */
        .search-container { position: relative; display: flex; align-items: center; }
        .search-input {
            position: absolute; right: 0; width: 0; padding: 0; border: none; outline: none; background: white;
            transition: width 0.4s ease, opacity 0.4s ease; opacity: 0; z-index: 10; font-family: 'Work Sans';
        }
        .search-container.active .search-input { width: 200px; padding: 5px 10px; opacity: 1; border-bottom: 1px solid var(--accent-gold); pointer-events: auto; }
        .search-icon { cursor: pointer; font-size: 1rem; z-index: 11; font-weight: 300; }

        /* Shop UI */
        .shop-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .category-filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { background: none; border: 1px solid #eee; padding: 10px 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-weight: 300; transition: 0.3s; }
        .filter-btn.active { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: white; padding: 15px; text-align: center; transition: 0.3s; border: 1px solid transparent; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px var(--gold-glow); }
        .product-card img { width: 100%; height: 350px; object-fit: cover; margin-bottom: 15px; }
        
        .buy-btn { background: var(--text-dark); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        /* Modals */
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <div class="header-left"><img src="logo/logo.jpg" alt="Logo"></div>
            <div class="header-center"><img src="brand/brandname.jpg" alt="Brand"></div>
            <div class="header-right"><span id="datetime-display"></span></div>
        </div>
        <div class="header-bottom">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" style="color:var(--accent-gold)">Shop</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
            <div class="action-icons">
                <div class="search-container" id="search-box">
                    <input type="text" class="search-input" id="shop-search" placeholder="SEARCH PIECES..." oninput="liveSearch()">
                    <i class="fas fa-search search-icon" onclick="toggleSearch()"></i>
                </div>
                <div class="cart-wrapper" onclick="openCart()">
                    <i class="fas fa-shopping-cart" style="font-size:0.95rem;"></i> (<span id="cart-count">0</span>)
                </div>
            </div>
        </div>
    </header>

    <div class="shop-container">
        <!-- Buttons will be generated here automatically by the script -->
        <div class="category-filters" id="dynamic-filters"></div>
        <div class="product-grid" id="product-display"></div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTgYE39QUtAj5Ewhjr4J8zbC_ZEknbMRJ5gp5V6wlBXWqa9mvbPf9qrmYnqkdR_rSvumbUhAp0F6ef/pub?gid=895459828&single=true&output=csv';
        let allProducts = [];
        let selectedCategory = "";

        async function loadShop() {
            const resp = await fetch(SHEET_URL);
            const data = await resp.text();
            const rows = data.split('\n').slice(1);
            
            allProducts = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(c.length < 7) return null;
                return { 
                    id: c[0].trim(), 
                    name: c[1].replace(/^"|"$/g, '').trim(), 
                    price: parseFloat(c[3]), 
                    category: c[6].replace(/^"|"$/g, '').trim() 
                };
            }).filter(p => p !== null);

            createFilters();
        }

        function createFilters() {
            const filterContainer = document.getElementById('dynamic-filters');
            // Get unique categories from the list
            const categories = [...new Set(allProducts.map(p => p.category))];
            
            filterContainer.innerHTML = '';
            categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (index === 0 ? ' active' : '');
                btn.innerText = cat;
                btn.onclick = (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    selectedCategory = cat;
                    displayProducts(cat);
                };
                filterContainer.appendChild(btn);
            });

            // Auto-load the first category found
            selectedCategory = categories[0];
            displayProducts(categories[0]);
        }

        function displayProducts(cat, query = "") {
            const grid = document.getElementById('product-display');
            grid.innerHTML = '';
            
            const filtered = allProducts.filter(p => {
                const matchCat = p.category === cat;
                const matchSearch = p.name.toLowerCase().includes(query.toLowerCase());
                return matchCat && matchSearch;
            });

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="images/${p.id.toLowerCase()}.jpg" onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'">
                        <h3>${p.name}</h3>
                        <p style="color:var(--accent-gold)">₦${p.price.toLocaleString()}</p>
                        <button class="buy-btn" onclick="alert('Added to cart')">Add to Cart</button>
                    </div>`;
            });
        }

        function liveSearch() {
            const val = document.getElementById('shop-search').value;
            displayProducts(selectedCategory, val);
        }

        function toggleSearch() {
            document.getElementById('search-box').classList.toggle('active');
            document.getElementById('shop-search').focus();
        }

        function updateTime() {
            const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('datetime-display').innerText = new Date().toLocaleDateString('en-US', options);
        }
        setInterval(updateTime, 1000); updateTime();

        loadShop();
    </script>
</body>
</html>
