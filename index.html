<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinzy Luxury Jeweries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC;     
            --surface-white: #FFFFFF; 
            --text-dark: #1A1A1A;     
            --accent-gold: #C5A059;   
            --transition-main: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Work Sans', sans-serif; margin: 0; background: var(--bg-pearl); overflow-x: hidden; }

        /* --- THE BOUTIQUE RIBBON HEADER --- */
        header {
            background: var(--surface-white);
            position: sticky; top: 0; z-index: 2000;
            width: 100%;
            box-shadow: 0 2px 20px rgba(0,0,0,0.02);
            transition: var(--transition-main);
        }

        /* ROW 1: Branding Area */
        .branding-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 15px 5%;
            height: 80px;
            transition: var(--transition-main);
        }
        .date-box { font-size: 0.65rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .logo-center { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .logo-center .main-logo { height: 40px; margin-bottom: 5px; transition: 0.3s; }
        .logo-center .brand-name { height: 18px; transition: 0.3s; }
        .icons-right { display: flex; justify-content: flex-end; gap: 20px; font-size: 1rem; }

        /* ROW 2: Navigation Area */
        .nav-row {
            padding: 12px 5%;
            border-top: 1px solid #F0F0F0;
            display: flex;
            justify-content: center;
            transition: var(--transition-main);
        }
        .nav-links {
            display: flex; gap: 30px; list-style: none; padding: 0; margin: 0;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-size: 0.85rem; font-weight: 300; }
        .nav-links a.active { color: var(--accent-gold); font-weight: 500; }

        /* --- THE MORPH (SCROLLED STATE) --- */
        header.scrolled { transform: translateY(-80px); } /* Hides Branding Row */
        
        /* Elements that "Peek" back into the Nav Row when scrolled */
        .scroll-brand-peek {
            position: absolute; left: 5%; 
            opacity: 0; transform: translateX(-20px);
            transition: 0.4s; pointer-events: none;
        }
        header.scrolled .scroll-brand-peek { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .scroll-brand-peek img { height: 20px; }

        .scroll-icons-peek {
            position: absolute; right: 5%;
            opacity: 0; transform: translateX(20px);
            transition: 0.4s; pointer-events: none;
            display: flex; gap: 20px;
        }
        header.scrolled .scroll-icons-peek { opacity: 1; transform: translateX(0); pointer-events: auto; }

        /* --- SEARCH DRAWER --- */
        .search-drawer {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: white; border-top: 1px solid #eee;
            padding: 20px; transform: translateY(-100%);
            opacity: 0; transition: 0.4s; z-index: -1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .search-drawer.open { transform: translateY(0); opacity: 1; }
        .search-input {
            width: 100%; border: none; border-bottom: 1px solid var(--accent-gold);
            padding: 10px; font-family: 'Work Sans'; font-size: 1.1rem; outline: none;
            text-align: center; text-transform: uppercase;
        }
        #results-area { max-height: 300px; overflow-y: auto; padding-top: 15px; }
        .result-row { padding: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #f9f9f9; }

        /* --- MOBILE TWEAKS (340 DPI) --- */
        @media (max-width: 400px) {
            .branding-row { grid-template-columns: 1fr 1fr; padding: 10px 5%; height: 60px; }
            .date-box { display: none; } /* Clear space for the brand */
            .logo-center { align-items: flex-start; }
            .logo-center .main-logo { height: 30px; }
            .logo-center .brand-name { height: 12px; }
            
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.7rem; letter-spacing: 1px; }

            header.scrolled { transform: translateY(-60px); }
            header.scrolled .nav-row { justify-content: flex-end; padding-right: 35%; } /* Pushes Nav to make room for Icons */
        }

        /* Content Placeholders */
        .hero { height: 300px; display: flex; align-items: center; justify-content: center; background: #f4f4f4; margin: 20px; border-radius: 8px; }
        .video-box { width: 100%; height: 250px; background: #000; overflow: hidden; margin-bottom: 40px; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="branding-row">
            <div class="date-box" id="live-date"></div>
            <div class="logo-center">
                <img src="logo/logo.jpg" class="main-logo" alt="Logo">
                <img src="brand/brandname.jpg" class="brand-name" alt="Chinzy Luxury">
            </div>
            <div class="icons-right">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <i class="fas fa-shopping-cart" onclick="window.location.href='shop.html'"></i>
            </div>
        </div>

        <nav class="nav-row">
            <div class="scroll-brand-peek">
                <img src="brand/brandname.jpg" alt="Brand">
            </div>

            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
            </ul>

            <div class="scroll-icons-peek">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <i class="fas fa-shopping-cart" onclick="window.location.href='shop.html'"></i>
            </div>
        </nav>

        <div class="search-drawer" id="search-drawer">
            <input type="text" class="search-input" id="search-field" placeholder="Search our collection..." oninput="searchData()">
            <div id="results-area"></div>
            <div style="text-align: center; margin-top: 15px;">
                <i class="fas fa-times" onclick="toggleSearch()" style="cursor:pointer; color:#ccc;"></i>
            </div>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1 style="font-family: 'Playfair Display'; font-weight: 400;">Timeless Elegance</h1>
        </div>

        <div class="video-box">
            <video autoplay muted loop playsinline>
                <source src="video/office_tour.mp4" type="video/mp4">
            </video>
        </div>
        
        <div style="height: 1000px; padding: 5%;">
            <p>Scroll down to see the header morph...</p>
        </div>
    </main>

    <script>
        // 1. Time Display
        function updateTime() {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
        }
        setInterval(updateTime, 1000); updateTime();

        // 2. Morphing Logic
        const head = document.getElementById('main-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) head.classList.add('scrolled');
            else head.classList.remove('scrolled');
        });

        // 3. Search Logic
        function toggleSearch() {
            document.getElementById('search-drawer').classList.toggle('open');
            if(document.getElementById('search-drawer').classList.contains('open')) {
                document.getElementById('search-field').focus();
            }
        }

        // 4. Live Search Simulator (Replace with your Sheet fetch)
        const mockProducts = [
            {name: "Diamond Ring", price: "250,000"},
            {name: "Gold Necklace", price: "180,000"},
            {name: "Luxury Watch", price: "450,000"},
            {name: "Pearl Earrings", price: "95,000"}
        ];

        function searchData() {
            const val = document.getElementById('search-field').value.toLowerCase();
            const area = document.getElementById('results-area');
            area.innerHTML = '';
            if(!val) return;

            const filtered = mockProducts.filter(p => p.name.toLowerCase().includes(val));
            filtered.forEach(p => {
                area.innerHTML += `
                    <div class="result-row" onclick="window.location.href='shop.html'">
                        <span>${p.name}</span>
                        <span style="color:var(--accent-gold)">₦${p.price}</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
