<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHINZY JEWERIES | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Modak&family=Playfair+Display:wght@400&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC; --surface: #FFFFFF; --text: #1A1A1A; 
            --accent: #C5A059; --transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            --brand-sz: 28px; /* Slightly larger now that it's alone */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Work Sans', sans-serif; margin: 0; background: var(--bg-pearl); overflow-x: hidden; }

        /* --- THE CLEAN EDITORIAL HEADER --- */
        header { background: var(--surface); position: sticky; top: 0; z-index: 2000; width: 100%; transition: var(--transition); box-shadow: 0 2px 20px rgba(0,0,0,0.02); }
        
        .branding-area { 
            display: flex; align-items: center; justify-content: center; 
            padding: 15px 5%; height: 80px; transition: var(--transition); 
        }
        .brand-text { 
            font-family: 'Modak', cursive; font-size: var(--brand-sz); 
            color: var(--text); white-space: nowrap; transition: var(--transition); 
            letter-spacing: 1px;
        }

        .nav-hub { 
            padding: 12px 5%; border-top: 1px solid #F0F0F0; 
            display: flex; flex-direction: column; align-items: center; transition: var(--transition); 
        }
        .nav-main-line { display: flex; justify-content: space-between; align-items: center; width: 100%; transition: var(--transition); }
        .nav-links { display: flex; gap: 25px; list-style: none; padding: 0; margin: 0; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.85rem; font-weight: 300; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .nav-links a.active { color: var(--accent); font-weight: 500; border-bottom: 1px solid var(--accent); }
        .hub-icon { font-size: 1.1rem; color: var(--text); cursor: pointer; transition: var(--transition); }

        .icon-stack-line { display: flex; gap: 30px; height: 0; opacity: 0; overflow: hidden; transition: var(--transition); }

        /* MORPH LOGIC */
        header.scrolled .branding-area { height: 0; padding: 0; opacity: 0; pointer-events: none; }
        header.scrolled .nav-hub { padding: 10px 5%; }
        header.scrolled .nav-main-line .hub-icon { opacity: 0; pointer-events: none; width: 0; }
        header.scrolled .nav-main-line { justify-content: center; }
        header.scrolled .nav-links a { font-size: calc(0.85rem - 2px); letter-spacing: 1px; }
        header.scrolled .icon-stack-line { height: 30px; opacity: 1; margin-top: 8px; overflow: visible; justify-content: center; }

        /* --- PRECISION SNAP CAROUSEL --- */
        .carousel-section { padding: 40px 0; background: white; }
        .carousel-container { 
            width: 100%; overflow: hidden; 
            position: relative;
            display: flex; justify-content: center;
        }
        .track { 
            display: flex; 
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            gap: 15px;
            padding: 0 15px;
        }
        .track img { 
            width: 145px; 
            height: 150px; 
            object-fit: cover; 
            border-radius: 4px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.06); 
            flex-shrink: 0;
            transition: 0.3s;
        }
        .track img.active { transform: scale(1.05); border: 1px solid var(--accent); }

        /* --- CONTENT BASICS --- */
        .section-title { text-align: center; font-family: 'Playfair Display'; font-weight: 400; margin-bottom: 25px; font-size: 1.5rem; }
        .video-box { width: 100%; height: 250px; background: #000; margin: 40px 0; position: relative; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; }
        
        @media (max-width: 380px) {
            .nav-links { gap: 15px; } .nav-links a { font-size: 0.75rem; }
            .brand-text { font-size: 24px; }
        }
        footer { text-align: center; padding: 40px; color: #999; font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header id="main-header">
        <!-- Brand Only Header -->
        <div class="branding-area">
            <div class="brand-text">CHINZY JEWERIES</div>
        </div>
        <nav class="nav-hub">
            <div class="nav-main-line">
                <i class="fas fa-magnifying-glass hub-icon" onclick="window.location.href='shop.html'"></i>
                <ul class="nav-links">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
                <i class="fas fa-shopping-cart hub-icon" onclick="window.location.href='shop.html'"></i>
            </div>
            <div class="icon-stack-line">
                <i class="fas fa-magnifying-glass hub-icon" onclick="window.location.href='shop.html'"></i>
                <i class="fas fa-shopping-cart hub-icon" onclick="window.location.href='shop.html'"></i>
            </div>
        </nav>
    </header>

    <main>
        <section class="carousel-section">
            <h2 class="section-title">New Arrivals</h2>
            <div class="carousel-container">
                <div class="track" id="arrival-track">
                    <!-- Images generated via JS for perfect cloning/looping -->
                </div>
            </div>
        </section>

        <div class="video-box">
            <video autoplay muted loop playsinline><source src="video/office_tour.mp4" type="video/mp4"></video>
        </div>
    </main>

    <footer>&copy; 2026 CHINZY LUXURY</footer>

    <script>
        // Header Morph
        window.addEventListener('scroll', () => { 
            document.getElementById('main-header').classList.toggle('scrolled', window.scrollY > 60); 
        });

        // Precision Snap Logic
        const track = document.getElementById('arrival-track');
        const productImages = [
            'products/prod1.jpg', 'products/prod2.jpg', 'products/prod3.jpg', 
            'products/prod4.jpg', 'products/prod5.jpg', 'products/prod6.jpg'
        ];
        
        // Populate track
        productImages.forEach((src, idx) => {
            const img = document.createElement('img');
            img.src = src;
            if(idx === 0) img.classList.add('active');
            track.appendChild(img);
        });

        let currentIdx = 0;
        const imgWidth = 145 + 15; // Width + Gap

        function snapNext() {
            currentIdx++;
            const images = track.getElementsByTagName('img');
            
            // Loop reset
            if (currentIdx >= images.length) {
                currentIdx = 0;
            }

            // Smooth Transform
            const offset = (window.innerWidth / 2) - (145 / 2) - (currentIdx * imgWidth);
            track.style.transform = `translateX(${offset}px)`;

            // Update Active State
            Array.from(images).forEach((img, i) => {
                img.classList.toggle('active', i === currentIdx);
            });
        }

        // Snap every 4 seconds
        setInterval(snapNext, 4000);
        
        // Initial centering
        window.onload = () => {
            const offset = (window.innerWidth / 2) - (145 / 2);
            track.style.transform = `translateX(${offset}px)`;
        };
    </script>
</body>
</html>
