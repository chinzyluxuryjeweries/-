<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Chinzy Luxury Jeweries</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Work Sans and Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables */
        :root {
            --bg-pearl: #FCFCFC;     
            --surface-white: #FFFFFF; 
            --text-dark: #1A1A1A;     
            --text-muted: #666666;
            --accent-gold: #C5A059;   
            --gold-glow: rgba(197, 160, 89, 0.15); 
            --border-radius: 4px;     
            --transition-speed: 0.4s;
        }

        body {
            font-family: 'Work Sans', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: var(--bg-pearl);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- HEADER STYLES --- */
        header {
            background-color: var(--surface-white);
            box-shadow: 0 2px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all var(--transition-speed) ease;
        }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; transition: all var(--transition-speed) ease;
        }

        .header-left img { height: 55px; width: auto; transition: height var(--transition-speed) ease; }
        .header-center { text-align: center; flex-grow: 1; }
        .header-center img { height: 45px; width: auto; transition: height var(--transition-speed) ease; }
        .header-right { text-align: right; min-width: 150px; }

        #datetime-display {
            font-size: 0.8rem; color: var(--text-muted); display: block;
            font-weight: 400; text-transform: uppercase; letter-spacing: 1.5px;
            transition: font-size var(--transition-speed) ease;
        }

        .header-bottom {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; border-top: 1px solid #F0F0F0;
            transition: all var(--transition-speed) ease; text-transform: uppercase;
        }

        .nav-links {
            display: flex; gap: 35px; list-style: none; padding: 0; margin: 0;
            transition: all var(--transition-speed) ease; align-items: center;
        }

        .nav-links li a {
            text-decoration: none; color: var(--text-dark);
            font-weight: 300; font-size: 0.95rem; letter-spacing: 2px; 
            position: relative; padding-bottom: 5px;
            transition: all var(--transition-speed) ease;
        }

        .nav-links li a:hover { color: var(--accent-gold); }
        .nav-links li a.active { color: var(--accent-gold); font-weight: 400; }
        .nav-links li a.active::after {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 100%; height: 1px; background-color: var(--accent-gold);
        }

        /* Dropdown Styles */
        .dropdown-parent { position: relative; }
        .dropdown {
            display: none; position: absolute; top: 100%; left: 0;
            background: var(--surface-white); box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            list-style: none; padding: 15px 0; margin: 0; min-width: 180px; z-index: 100;
            border: 1px solid #F0F0F0; border-radius: 4px;
        }
        
        /* Triggers on hover for desktop, tap for mobile */
        .dropdown-parent:hover .dropdown, 
        .dropdown-parent:active .dropdown { 
            display: block; animation: fadeUp 0.3s ease; 
        }
        
        .dropdown li { padding: 0; }
        .dropdown li a { display: block; padding: 10px 20px; font-size: 0.85rem; letter-spacing: 1.5px; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .action-icons { display: flex; align-items: center; gap: 25px; position: relative; }

        /* Search Overlay */
        .search-container { position: relative; display: flex; align-items: center; justify-content: flex-end; }
        .search-input {
            position: absolute; right: 0; width: 0; padding: 0;
            border: none; outline: none; background: var(--surface-white);
            transition: width 0.4s ease, padding 0.4s ease, opacity 0.4s ease;
            font-family: 'Work Sans', sans-serif; font-weight: 300;
            text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
            z-index: 10; opacity: 0; pointer-events: none; 
        }
        .search-container.active .search-input {
            width: 250px; padding: 8px 35px 8px 10px; border-bottom: 1px solid var(--accent-gold);
            opacity: 1; pointer-events: auto; box-shadow: -15px 0 15px var(--surface-white); 
        }
        .search-icon {
            cursor: pointer; font-size: 1.1rem; color: var(--text-dark);
            transition: color var(--transition-speed); position: relative; z-index: 11; 
        }
        .search-icon:hover { color: var(--accent-gold); }

        /* Cart */
        .cart-wrapper {
            display: flex; align-items: center; gap: 5px; font-weight: 300;
            color: var(--text-dark); letter-spacing: 1px; cursor: pointer; transition: color var(--transition-speed);
        }
        .cart-wrapper:hover { color: var(--accent-gold); }
        .cart-wrapper.has-items { color: var(--accent-gold); font-weight: 400; }
        .cart-icon { font-size: 1.1rem; }

        /* --- SCROLLED HEADER STATE --- */
        header.scrolled .header-top { padding: 5px 40px; }
        header.scrolled .header-center img { height: 28px; }
        header.scrolled .header-left img { height: 35px; }
        header.scrolled #datetime-display { font-size: 0.7rem; }
        header.scrolled .header-bottom { padding: 5px 40px; }
        header.scrolled .nav-links li a { font-size: 0.8rem; letter-spacing: 1.5px; }

        /* --- FLUID MOBILE RESPONSIVENESS (NO HAMBURGER MENU) --- */
        @media (max-width: 800px) {
            .header-top { padding: 15px 3vw; }
            .header-bottom { padding: 15px 3vw; }
            
            /* Fluid Images */
            .header-left img { height: 6vw; min-height: 20px; }
            .header-center img { height: 6.5vw; min-height: 22px; }
            .header-right { min-width: auto; }
            
            /* Fluid Fonts using Viewport Width (vw) */
            #datetime-display { font-size: 2vw; letter-spacing: 0.5px; }
            
            .nav-links { gap: 3vw; }
            .nav-links li a { font-size: 2.8vw; letter-spacing: 1px; }
            
            .action-icons { gap: 3vw; }
            .search-icon, .cart-icon { font-size: 3.5vw; }
            .cart-wrapper { font-size: 2.8vw; gap: 2px; }
            
            /* Shrink search bar so it doesn't overflow mobile screen */
            .search-container.active .search-input { width: 45vw; font-size: 2.5vw; }

            /* Center the dropdown so it doesn't bleed off the screen edge */
            .dropdown { left: 50%; transform: translateX(-50%); min-width: 140px; }
            .dropdown li a { font-size: 3vw; }

            /* Scrolled State for Mobile */
            header.scrolled .header-top { padding: 8px 3vw; }
            header.scrolled .header-bottom { padding: 8px 3vw; }
            header.scrolled .header-left img { height: 4.5vw; }
            header.scrolled .header-center img { height: 5vw; }
            header.scrolled #datetime-display { font-size: 1.8vw; }
            header.scrolled .nav-links li a { font-size: 2.5vw; }
        }

        /* Extremely small screens (e.g. old iPhones) */
        @media (max-width: 400px) {
            .nav-links li a { letter-spacing: 0; }
            #datetime-display { letter-spacing: 0; }
        }

        /* --- MAIN BODY STYLES --- */
        main { padding: 50px 40px; max-width: 1400px; margin: auto; }
        @media (max-width: 800px) { main { padding: 30px 20px; } }

        h2.section-title {
            text-align: center; color: var(--text-dark); font-size: 2.5rem;
            margin-bottom: 40px; margin-top: 60px; font-family: 'Playfair Display', serif; 
            font-weight: 400; letter-spacing: 1px;
        }
        h2.section-title::after {
            content: ''; display: block; width: 60px; height: 1px;
            background-color: var(--accent-gold); margin: 15px auto 0;
        }

        /* Carousel */
        .carousel-container { width: 100%; overflow: hidden; position: relative; padding: 30px 0; }
        .carousel-track { display: flex; width: calc(320px * 20); transform: translateX(0); }
        .carousel-track img {
            width: 280px; height: 350px; object-fit: cover; border-radius: var(--border-radius); 
            margin: 0 20px; box-shadow: 0 10px 25px var(--gold-glow); 
            transition: transform 0.5s ease, box-shadow 0.5s ease; background: var(--surface-white);
        }
        .carousel-track img:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(197, 160, 89, 0.3); }

        /* Video */
        .video-container {
            width: 100%; max-width: 900px; margin: 0 auto; border-radius: var(--border-radius); 
            overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.08); border: 1px solid #EAEAEA;
        }
        .video-container video { width: 100%; display: block; }

        /* Testimonials */
        .testimonial-container {
            width: 100%; max-width: 800px; margin: 0 auto; position: relative; overflow: hidden;
            border: 1px solid var(--accent-gold); padding: 10px; 
            background: var(--surface-white); box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .testimonial-inner { border: 1px solid #EAEAEA; overflow: hidden; }
        .testimonial-slide { display: none; width: 100%; }
        .testimonial-slide.active { display: block; animation: fadeEffect 1.5s ease; }
        .testimonial-slide img { width: 100%; height: auto; display: block; }
        @keyframes fadeEffect { from { opacity: 0.2; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Footer */
        footer {
            background-color: var(--surface-white); color: var(--text-dark); text-align: center;
            padding: 50px 20px 30px; margin-top: 80px; border-top: 1px solid #F0F0F0;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            font-weight: 300; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem;
        }
        .whatsapp-link {
            display: inline-flex; align-items: center; justify-content: center;
            width: 55px; height: 55px; background-color: #25D366; color: white;
            border-radius: 50%; font-size: 1.8rem; text-decoration: none;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); transition: all var(--transition-speed); margin-top: 10px;
        }
        .whatsapp-link:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(37, 211, 102, 0.4); }

    </style>
</head>

    <script>
        // --- 1. Date and Time Update ---
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('datetime-display').innerText = now.toLocaleDateString('en-US', options);
            document.getElementById('current-year').innerText = now.getFullYear();
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // --- 2. Sticky Shrinking Header ---
        const header = document.getElementById('main-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 40) { header.classList.add('scrolled'); } 
            else { header.classList.remove('scrolled'); }
        });

        // --- 3. Expandable Search ---
        function toggleSearch() {
            const container = document.getElementById('search-container');
            const input = document.getElementById('search-input');
            container.classList.toggle('active');
            if(container.classList.contains('active')){ input.focus(); }
        }
        document.addEventListener('click', function(event) {
            const container = document.getElementById('search-container');
            if (!container.contains(event.target) && container.classList.contains('active')) {
                container.classList.remove('active');
            }
        });

        // --- 4. Step-by-Step Javascript Carousel ---
        const track = document.getElementById('product-track');
        let currentSlide = 0;
        const totalUniqueSlides = 10; 
        const slideWidth = 320; 

        function moveCarousel() {
            currentSlide++;
            track.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
            track.style.transform = `translateX(-${currentSlide * slideWidth}px)`;

            if (currentSlide === totalUniqueSlides) {
                setTimeout(() => {
                    track.style.transition = 'none';
                    currentSlide = 0;
                    track.style.transform = `translateX(0)`;
                }, 600); 
            }
        }
        
        let carouselTimer = setInterval(moveCarousel, 5000);
        const carouselContainer = document.querySelector('.carousel-container');
        carouselContainer.addEventListener('mouseenter', () => clearInterval(carouselTimer));
        carouselContainer.addEventListener('mouseleave', () => carouselTimer = setInterval(moveCarousel, 5000));

        // --- 5. Testimonial Slideshow Logic ---
        let testIndex = 0;
        let testInterval;
        function showTestimonials() {
            let slides = document.getElementsByClassName("testimonial-slide");
            for (let i = 0; i < slides.length; i++) { slides[i].classList.remove("active"); }
            testIndex++;
            if (testIndex > slides.length) {testIndex = 1}    
            slides[testIndex-1].classList.add("active");  
            testInterval = setTimeout(showTestimonials, 4000); 
        }
        showTestimonials();
        const sliderContainer = document.getElementById('testimonial-slider');
        sliderContainer.addEventListener('mouseenter', () => clearTimeout(testInterval));
        sliderContainer.addEventListener('mouseleave', () => testInterval = setTimeout(showTestimonials, 4000));

    </script>
