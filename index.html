<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfumed Jewelry Boutique</title>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; --light: #f9f9f9; }
        body { font-family: 'Playfair Display', serif; margin: 0; background: var(--light); color: var(--dark); }
        header { text-align: center; padding: 50px 20px; background: white; border-bottom: 1px solid #eee; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 4px; }
        .price { font-weight: bold; color: var(--gold); font-size: 1.2rem; }
        .btn { background: var(--dark); color: white; border: none; padding: 12px 25px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .cart-count { position: fixed; top: 20px; right: 20px; background: var(--gold); color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        /* Simple Modal */
        #checkout-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
    </style>
</head>
<body>

<header>
    <h1>Perfumed Jewelry</h1>
    <p>Elegant Scented Adornments</p>
</header>

<div class="cart-count" onclick="openCheckout()">Cart: <span id="count">0</span></div>

<div class="product-grid" id="product-container">
    <!-- Products will load here from Google Sheets -->
</div>

<div id="checkout-modal">
    <div class="modal-content">
        <h3>Finalize Interest</h3>
        <input type="text" id="visitor-name" placeholder="Your Full Name" required>
        <input type="email" id="visitor-email" placeholder="Your Email Address" required>
        <button class="btn" onclick="sendToWhatsApp()">Submit & Chat on WhatsApp</button>
        <button onclick="closeModal()" style="border:none; background:none; color:red; cursor:pointer; margin-top:10px;">Cancel</button>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTgYE39QUtAj5Ewhjr4J8zbC_ZEknbMRJ5gp5V6wlBXWqa9mvbPf9qrmYnqkdR_rSvumbUhAp0F6ef/pub?gid=895459828&single=true&output=csv'; // From Step 2
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZquSe37kjZGZuzy3KUINu7tFn41CMoHa0r5_0T_tHS18BsCQ-p85dDDcpcYITN-F7/exec'; // From Step 1
    let cart = [];

    // 1. Fetch Products from Tab 1
    async function loadProducts() {
        const response = await fetch(SHEET_URL);
        const data = await response.text();
        const rows = data.split('\n').slice(1); // Skip header
        
        const container = document.getElementById('product-container');
        rows.forEach(row => {
            const cols = row.split(','); 
            if(cols.length < 5) return;
            
            const [id, name, desc, price, qty, img] = cols; // Matches your sheet structure
            const isOutOfStock = parseInt(qty) <= 0;

            container.innerHTML += `
                <div class="card">
                    <img src="${img}" alt="${name}">
                    <h3>${name}</h3>
                    <p>${desc}</p>
                    <p class="price">$${price}</p>
                    <button class="btn" ${isOutOfStock ? 'disabled' : ''} 
                        onclick="addToCart('${name}', ${price})">
                        ${isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
                    </button>
                </div>
            `;
        });
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('count').innerText = cart.length;
        alert(name + " added to cart!");
    }

    function openCheckout() {
        if(cart.length === 0) return alert("Cart is empty!");
        document.getElementById('checkout-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('checkout-modal').style.display = 'none';
    }

    // 2. Send Data to Tab 2 and Open WhatsApp
    async function sendToWhatsApp() {
        const name = document.getElementById('visitor-name').value;
        const email = document.getElementById('visitor-email').value;
        
        if(!name || !email) return alert("Please fill details");

        let orderList = cart.map((item, index) => `${index + 1}. ${item.name} - $${item.price}`).join('\n');
        let total = cart.reduce((sum, item) => sum + item.price, 0);
        let fullOrderString = `${orderList}\nTotal: $${total}`;

        // Save to Google Sheet Tab 2
        await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ name, email, order: fullOrderString })
        });

        // Redirect to WhatsApp
        const myPhone = "2349057835662"; // Replace with your phone number
        const message = `Hi, My name is ${name}. I want to purchase the following items:\n\n${fullOrderString}\n\nCan you please reach out so we can talk?`;
        window.location.href = `https://wa.me/${myPhone}?text=${encodeURIComponent(message)}`;
    }

    loadProducts();
</script>
</body>
</html>
