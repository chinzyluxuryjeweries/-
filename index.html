<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Chinzy Luxury Jeweries</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Work Sans (Light 300, Regular 400) and Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables for Theme */
        :root {
            --light-purple: #F3E5F5; 
            --dark-purple: #4A148C;  
            --text-dark: #333333;
            --white: #ffffff;
            --border-radius: 12px;
            --transition-speed: 0.3s;
        }

        body {
            font-family: 'Work Sans', 'Segoe UI', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: var(--light-purple);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- HEADER STYLES --- */
        header {
            background-color: var(--white);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all var(--transition-speed) ease;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            transition: all var(--transition-speed) ease;
        }

        .header-left img { height: 50px; width: auto; }

        .header-center {
            text-align: center;
            flex-grow: 1;
            transition: all var(--transition-speed) ease;
        }

        .header-center img {
            height: 40px;
            width: auto;
            transition: all var(--transition-speed) ease;
        }

        .header-right {
            text-align: right;
            min-width: 150px; 
        }

        #datetime-display {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
            display: block;
            font-family: 'Work Sans', sans-serif;
            font-weight: 300;
            text-transform: uppercase; /* FORCED UPPERCASE */
            letter-spacing: 1px;
        }

        .header-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px 15px;
            border-top: 1px solid #f0f0f0;
            transition: all var(--transition-speed) ease;
            text-transform: uppercase; /* FORCED UPPERCASE FOR ENTIRE BOTTOM ROW */
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
            padding: 0;
            margin: 0;
            transition: all var(--transition-speed) ease;
        }

        .nav-links li a {
            text-decoration: none;
            color: var(--text-dark);
            font-family: 'Work Sans', sans-serif;
            font-weight: 300; /* LIGHT WEIGHT FONT */
            font-size: 1rem;
            letter-spacing: 1.5px; /* Adds breathing room between letters for luxury feel */
            position: relative;
            padding-bottom: 5px;
            transition: color var(--transition-speed);
        }

        .nav-links li a:hover {
            color: var(--dark-purple);
        }

        .nav-links li a.active {
            color: var(--dark-purple);
            text-shadow: 0 0 8px rgba(74, 20, 140, 0.15); 
            font-weight: 400; /* Slightly thicker just for the active page so it stands out */
        }
        
        .nav-links li a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px; 
            background-color: var(--dark-purple);
            box-shadow: 0 0 5px var(--dark-purple);
        }

        .action-icons {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative; /* Crucial for absolute search bar positioning */
        }

        /* --- EXPANDABLE SEARCH OVERLAY FIX --- */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .search-input {
            position: absolute;
            right: 0;
            width: 0;
            padding: 0;
            border: none;
            outline: none;
            background: var(--white); /* Solid white to cover the nav links */
            transition: width 0.4s ease, padding 0.4s ease, opacity 0.4s ease;
            font-family: 'Work Sans', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            font-size: 0.9rem;
            z-index: 10; /* Stays above the navigation text */
            opacity: 0; /* Hidden by default */
            pointer-events: none; /* Can't click it when hidden */
        }

        .search-container.active .search-input {
            width: 250px; 
            padding: 8px 35px 8px 10px; /* Extra padding on right so text doesn't hide behind icon */
            border-bottom: 1px solid var(--dark-purple);
            opacity: 1;
            pointer-events: auto;
            /* Creates a soft white fade to the left edge to blend it seamlessly */
            box-shadow: -15px 0 15px var(--white); 
        }

        .search-icon {
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-dark);
            transition: color var(--transition-speed);
            position: relative;
            z-index: 11; /* Keeps the icon clickable ABOVE the input bar */
        }

        .cart-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Work Sans', sans-serif;
            font-weight: 300;
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        .cart-wrapper.has-items { color: var(--dark-purple); font-weight: 400; }
        .cart-wrapper.has-items .cart-icon { color: var(--dark-purple); }
        .cart-icon { font-size: 1.2rem; }

        /* --- SCROLLED HEADER STATE --- */
        header.scrolled .header-top { display: none; }
        header.scrolled .header-bottom { border-top: none; padding: 15px 40px; }

        .scrolled-brand { display: none; height: 30px; margin-right: 30px; }
        header.scrolled .scrolled-brand { display: block; }
        header.scrolled .nav-links { margin-right: auto; }

        /* --- MAIN BODY STYLES --- */
        main { padding: 40px; max-width: 1400px; margin: auto; }

        h2.section-title {
            text-align: center;
            color: var(--dark-purple);
            font-size: 2.2rem;
            margin-bottom: 30px;
            margin-top: 50px;
            font-family: 'Playfair Display', serif; 
            font-weight: 400;
        }

        /* Carousel */
        .carousel-container {
            width: 100%; overflow: hidden; position: relative;
            background: var(--white); border-radius: var(--border-radius);
            padding: 20px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .carousel-track {
            display: flex; width: calc(300px * 20); 
            animation: scrollTrack 30s linear infinite;
        }
        .carousel-track:hover { animation-play-state: paused; }
        .carousel-track img {
            width: 250px; height: 250px; object-fit: cover;
            border-radius: 8px; margin: 0 25px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        @keyframes scrollTrack { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-300px * 10)); } }

        /* Video */
        .video-container {
            width: 100%; max-width: 800px; margin: 0 auto;
            border-radius: var(--border-radius); overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .video-container video { width: 100%; display: block; }

        /* Testimonials */
        .testimonial-container {
            width: 100%; max-width: 800px; margin: 0 auto; position: relative; overflow: hidden;
            border: 15px solid transparent;
            border-image: repeating-linear-gradient(45deg, var(--dark-purple), var(--dark-purple) 10px, var(--light-purple) 10px, var(--light-purple) 20px) 15;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); background: var(--white);
        }
        .testimonial-slide { display: none; width: 100%; }
        .testimonial-slide.active { display: block; animation: fadeEffect 1s; }
        .testimonial-slide img { width: 100%; height: auto; display: block; }
        @keyframes fadeEffect { from { opacity: 0.4; } to { opacity: 1; } }

        /* Footer */
        footer {
            background-color: var(--white); color: var(--text-dark); text-align: center;
            padding: 30px 20px; margin-top: 60px; border-top: 1px solid #e0e0e0;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            font-family: 'Work Sans', sans-serif; font-weight: 300;
        }
        .whatsapp-link {
            display: inline-flex; align-items: center; justify-content: center;
            width: 50px; height: 50px; background-color: #25D366; color: white;
            border-radius: 50%; font-size: 1.8rem; text-decoration: none;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.4); transition: transform var(--transition-speed);
        }
        .whatsapp-link:hover { transform: scale(1.1); }

    </style>
</head>

    <script>
        // --- 1. Date and Time Update ---
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('datetime-display').innerText = now.toLocaleDateString('en-US', options);
            document.getElementById('current-year').innerText = now.getFullYear();
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // --- 2. Sticky Morphing Header Logic ---
        const header = document.getElementById('main-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 60) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // --- 3. Expandable Search ---
        function toggleSearch() {
            const container = document.getElementById('search-container');
            const input = document.getElementById('search-input');
            container.classList.toggle('active');
            if(container.classList.contains('active')){
                input.focus();
            }
        }

        // Close search if user clicks anywhere outside of it
        document.addEventListener('click', function(event) {
            const container = document.getElementById('search-container');
            const input = document.getElementById('search-input');
            if (!container.contains(event.target) && container.classList.contains('active')) {
                container.classList.remove('active');
                input.value = ''; // Optional: clear the text when clicking away
            }
        });

        // --- 4. Testimonial Slideshow Logic ---
        let slideIndex = 0;
        let slideInterval;

        function showSlides() {
            let slides = document.getElementsByClassName("testimonial-slide");
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].classList.add("active");  
            slideInterval = setTimeout(showSlides, 3000); 
        }
        
        showSlides();

        const sliderContainer = document.getElementById('testimonial-slider');
        sliderContainer.addEventListener('mouseenter', () => {
            clearTimeout(slideInterval);
        });
        sliderContainer.addEventListener('mouseleave', () => {
            slideInterval = setTimeout(showSlides, 3000);
        });

    </script>
