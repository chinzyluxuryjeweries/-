<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Chinzy Luxury Jeweries</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Work Sans (Light 300, Regular 400) and Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables for the New "Champagne & Pearl" Luxury Theme */
        :root {
            --bg-pearl: #FCFCFC;      /* Very subtle off-white */
            --surface-white: #FFFFFF; /* Pure white for cards/header */
            --text-dark: #1A1A1A;     /* Deep charcoal (softer than pure black) */
            --text-muted: #666666;
            --accent-gold: #C5A059;   /* Refined metallic gold */
            --gold-glow: rgba(197, 160, 89, 0.15); /* Soft gold shadow for sparkle */
            --border-radius: 4px;     /* Sharper edges for a more modern, high-fashion look */
            --transition-speed: 0.4s;
        }

        body {
            font-family: 'Work Sans', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: var(--bg-pearl);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- HEADER STYLES --- */
        header {
            background-color: var(--surface-white);
            box-shadow: 0 2px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all var(--transition-speed) ease;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            transition: all var(--transition-speed) ease;
        }

        .header-left img { height: 55px; width: auto; }

        .header-center {
            text-align: center;
            flex-grow: 1;
            transition: all var(--transition-speed) ease;
        }

        .header-center img {
            height: 45px;
            width: auto;
            transition: all var(--transition-speed) ease;
        }

        .header-right {
            text-align: right;
            min-width: 150px; 
        }

        #datetime-display {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: block;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .header-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            border-top: 1px solid #F0F0F0;
            transition: all var(--transition-speed) ease;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
            padding: 0;
            margin: 0;
            transition: all var(--transition-speed) ease;
        }

        .nav-links li a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 300; 
            font-size: 0.95rem;
            letter-spacing: 2px; 
            position: relative;
            padding-bottom: 5px;
            transition: color var(--transition-speed);
        }

        .nav-links li a:hover {
            color: var(--accent-gold);
        }

        .nav-links li a.active {
            color: var(--accent-gold);
            font-weight: 400; 
        }
        
        .nav-links li a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px; 
            background-color: var(--accent-gold);
        }

        .action-icons {
            display: flex;
            align-items: center;
            gap: 25px;
            position: relative; 
        }

        /* --- EXPANDABLE SEARCH OVERLAY --- */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .search-input {
            position: absolute;
            right: 0;
            width: 0;
            padding: 0;
            border: none;
            outline: none;
            background: var(--surface-white);
            transition: width 0.4s ease, padding 0.4s ease, opacity 0.4s ease;
            font-family: 'Work Sans', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 10; 
            opacity: 0; 
            pointer-events: none; 
        }

        .search-container.active .search-input {
            width: 250px; 
            padding: 8px 35px 8px 10px; 
            border-bottom: 1px solid var(--accent-gold);
            opacity: 1;
            pointer-events: auto;
            box-shadow: -15px 0 15px var(--surface-white); 
        }

        .search-icon {
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text-dark);
            transition: color var(--transition-speed);
            position: relative;
            z-index: 11; 
        }
        
        .search-icon:hover { color: var(--accent-gold); }

        .cart-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 300;
            color: var(--text-dark);
            letter-spacing: 1px;
            cursor: pointer;
            transition: color var(--transition-speed);
        }

        .cart-wrapper:hover { color: var(--accent-gold); }
        .cart-wrapper.has-items { color: var(--accent-gold); font-weight: 400; }
        .cart-icon { font-size: 1.1rem; }

        /* --- SCROLLED HEADER STATE --- */
        header.scrolled .header-top { display: none; }
        header.scrolled .header-bottom { border-top: none; padding: 15px 40px; }

        .scrolled-brand { display: none; height: 35px; margin-right: 40px; }
        header.scrolled .scrolled-brand { display: block; }
        header.scrolled .nav-links { margin-right: auto; }

        /* --- MAIN BODY STYLES --- */
        main { padding: 50px 40px; max-width: 1400px; margin: auto; }

        h2.section-title {
            text-align: center;
            color: var(--text-dark);
            font-size: 2.5rem;
            margin-bottom: 40px;
            margin-top: 60px;
            font-family: 'Playfair Display', serif; 
            font-weight: 400;
            letter-spacing: 1px;
        }
        
        h2.section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background-color: var(--accent-gold);
            margin: 15px auto 0;
        }

        /* 1. Carousel (Slowed down to 15s per image = 150s total) */
        .carousel-container {
            width: 100%; overflow: hidden; position: relative;
            background: transparent; 
            padding: 30px 0; 
        }
        
        .carousel-track {
            display: flex; 
            width: calc(320px * 20); /* Adjusted for new image width + margins */
            animation: scrollTrack 150s linear infinite; /* 150 SECONDS = 15s per image */
        }
        
        .carousel-track:hover { animation-play-state: paused; }
        
        .carousel-track img {
            width: 280px; 
            height: 350px; /* Taller, portrait style images look more luxurious */
            object-fit: cover;
            border-radius: var(--border-radius); 
            margin: 0 20px; 
            box-shadow: 0 10px 25px var(--gold-glow); /* The "Spark" shadow */
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            background: var(--surface-white);
        }
        
        .carousel-track img:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(197, 160, 89, 0.3); /* Glow intensifies on hover */
        }
        
        @keyframes scrollTrack { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-320px * 10)); } }

        /* 2. Video */
        .video-container {
            width: 100%; max-width: 900px; margin: 0 auto;
            border-radius: var(--border-radius); overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            border: 1px solid #EAEAEA;
        }
        .video-container video { width: 100%; display: block; }

        /* 3. Testimonials */
        .testimonial-container {
            width: 100%; max-width: 800px; margin: 0 auto; position: relative; overflow: hidden;
            border: 1px solid var(--accent-gold);
            padding: 10px; /* Creates a double-border "frame" effect */
            background: var(--surface-white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .testimonial-inner {
            border: 1px solid #EAEAEA;
            overflow: hidden;
        }

        .testimonial-slide { display: none; width: 100%; }
        .testimonial-slide.active { display: block; animation: fadeEffect 1.5s ease; }
        .testimonial-slide img { width: 100%; height: auto; display: block; }
        @keyframes fadeEffect { from { opacity: 0.2; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* --- FOOTER --- */
        footer {
            background-color: var(--surface-white); 
            color: var(--text-dark); 
            text-align: center;
            padding: 50px 20px 30px; 
            margin-top: 80px; 
            border-top: 1px solid #F0F0F0;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }
        
        .whatsapp-link {
            display: inline-flex; align-items: center; justify-content: center;
            width: 55px; height: 55px; background-color: #25D366; color: white;
            border-radius: 50%; font-size: 1.8rem; text-decoration: none;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); 
            transition: all var(--transition-speed);
            margin-top: 10px;
        }
        
        .whatsapp-link:hover { 
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(37, 211, 102, 0.4); 
        }

    </style>
</head>

    <script>
        // --- 1. Date and Time Update ---
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('datetime-display').innerText = now.toLocaleDateString('en-US', options);
            document.getElementById('current-year').innerText = now.getFullYear();
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // --- 2. Sticky Morphing Header Logic ---
        const header = document.getElementById('main-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 60) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // --- 3. Expandable Search ---
        function toggleSearch() {
            const container = document.getElementById('search-container');
            const input = document.getElementById('search-input');
            container.classList.toggle('active');
            if(container.classList.contains('active')){
                input.focus();
            }
        }

        document.addEventListener('click', function(event) {
            const container = document.getElementById('search-container');
            const input = document.getElementById('search-input');
            if (!container.contains(event.target) && container.classList.contains('active')) {
                container.classList.remove('active');
            }
        });

        // --- 4. Testimonial Slideshow Logic ---
        let slideIndex = 0;
        let slideInterval;

        function showSlides() {
            let slides = document.getElementsByClassName("testimonial-slide");
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].classList.add("active");  
            slideInterval = setTimeout(showSlides, 4000); // Slowed down slightly to 4 seconds for readability
        }
        
        showSlides();

        const sliderContainer = document.getElementById('testimonial-slider');
        sliderContainer.addEventListener('mouseenter', () => {
            clearTimeout(slideInterval);
        });
        sliderContainer.addEventListener('mouseleave', () => {
            slideInterval = setTimeout(showSlides, 4000);
        });

    </script>
