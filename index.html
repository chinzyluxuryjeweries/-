<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinzy Luxury Jeweries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC;     
            --surface-white: #FFFFFF; 
            --text-dark: #1A1A1A;     
            --accent-gold: #C5A059;   
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Hierarchy Base (Adjust these to your liking) */
            --brand-sz: 60px; 
            --sub-sz: 16px; /* Exactly 1px smaller */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Work Sans', sans-serif; margin: 0; background: var(--bg-pearl); overflow-x: hidden; }

        header {
            background: var(--surface-white);
            position: sticky; top: 0; z-index: 2000;
            width: 100%;
            box-shadow: 0 2px 20px rgba(0,0,0,0.02);
            transition: var(--transition);
        }

        /* --- TOP ROW: BRAND DOMINANCE --- */
        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 5%; height: 80px; transition: var(--transition);
            gap: 10px;
        }

        .date-box { 
            flex: 1; font-size: 0.65rem; color: #999; 
            text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; height: var(--sub-sz);
        }

        .brand-center { 
            flex: 2; display: flex; justify-content: center; align-items: center; 
        }
        .brand-center img { 
            height: var(--brand-sz); width: auto; transition: 0.3s; 
        }

        .icons-right { 
            flex: 1; display: flex; justify-content: flex-end; gap: 18px; 
            align-items: center; height: var(--sub-sz);
        }
        .icons-right i { font-size: 0.95rem; cursor: pointer; color: var(--text-dark); }

        /* --- BOTTOM ROW: NAVIGATION --- */
        .nav-row {
            padding: 12px 5%; border-top: 1px solid #F0F0F0;
            display: flex; justify-content: center; align-items: center;
            transition: var(--transition); position: relative;
        }

        .nav-links { display: flex; gap: 25px; list-style: none; padding: 0; margin: 0; }
        .nav-links a { 
            text-decoration: none; color: var(--text-dark); 
            font-size: 0.85rem; font-weight: 300; text-transform: uppercase;
            letter-spacing: 1.5px; transition: 0.3s;
        }

        /* --- THE MORPH (SCROLLED) --- */
        header.scrolled { transform: translateY(-80px); }

        /* Logo Peek on Scroll */
        .logo-peek {
            position: absolute; left: 5%; opacity: 0; transform: translateX(-15px);
            transition: 0.4s; pointer-events: none;
        }
        header.scrolled .logo-peek { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .logo-peek img { height: 20px; }

        /* Nav Micro-Shrink (-2px) */
        header.scrolled .nav-links a { font-size: calc(0.85rem - 2px); letter-spacing: 1px; }

        /* Icons Peek on Scroll */
        .icons-peek {
            position: absolute; right: 5%; opacity: 0; transform: translateX(15px);
            transition: 0.4s; pointer-events: none; display: flex; gap: 18px;
        }
        header.scrolled .icons-peek { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .icons-peek i { font-size: 0.9rem; color: var(--text-dark); }

        /* --- SEARCH DRAWER (FUNCTIONAL) --- */
        .search-drawer {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: white; border-top: 1px solid #eee; padding: 20px;
            transform: translateY(-100%); opacity: 0; transition: 0.4s; z-index: -1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .search-drawer.active { transform: translateY(0); opacity: 1; }
        .search-input {
            width: 100%; border: none; border-bottom: 1px solid var(--accent-gold);
            padding: 10px; font-family: 'Work Sans'; font-size: 1rem; outline: none;
            text-align: center; text-transform: uppercase;
        }
        #results-list { max-height: 250px; overflow-y: auto; margin-top: 15px; }
        .search-item { 
            padding: 12px; border-bottom: 1px solid #f9f9f9; 
            display: flex; justify-content: space-between; font-size: 0.85rem;
            cursor: pointer;
        }
        .search-item:hover { background: #fdfaf4; }

        /* --- MOBILE SCALE (340 DPI) --- */
        @media (max-width: 320px) {
            :root { --brand-sz: 50px; --sub-sz: 12px; }
            .header-top { height: 70px; }
            header.scrolled { transform: translateY(-70px); }
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.75rem; }
            header.scrolled .nav-links a { font-size: calc(0.75rem - 2px); }
        }

        /* Simple Spacer */
        .content { padding: 40px 5%; min-height: 1500px; text-align: center; color: #ccc; }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <div class="date-box" id="live-date"></div>
            <div class="brand-center">
                <img src="brand/brandname.jpg" alt="Chinzy Luxury">
            </div>
            <div class="icons-right">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <i class="fas fa-shopping-cart" onclick="window.location.href='shop.html'"></i>
            </div>
        </div>

        <nav class="nav-row">
            <div class="logo-peek">
                <img src="logo/logo.jpg" alt="L">
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
            <div class="icons-peek">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <i class="fas fa-shopping-cart" onclick="window.location.href='shop.html'"></i>
            </div>
        </nav>

        <div class="search-drawer" id="search-box">
            <input type="text" class="search-input" id="search-input" placeholder="Search for jewelry..." oninput="filterResults()">
            <div id="results-list"></div>
            <div style="text-align:center; padding-top:10px;">
                <i class="fas fa-times" onclick="toggleSearch()" style="color:#ddd; cursor:pointer;"></i>
            </div>
        </div>
    </header>

    <div class="content">
        <h2 style="font-family:'Playfair Display'; color:#1a1a1a; font-weight:400;">Timeless Beauty</h2>
        <p>Scroll down to see the luxury morphing effect...</p>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTgYE39QUtAj5Ewhjr4J8zbC_ZEknbMRJ5gp5V6wlBXWqa9mvbPf9qrmYnqkdR_rSvumbUhAp0F6ef/pub?gid=895459828&single=true&output=csv';
        let inventory = [];

        // 1. Functional Search Data Fetch
        async function loadInventory() {
            try {
                const resp = await fetch(CSV_URL);
                const data = await resp.text();
                const lines = data.split('\n').slice(1);
                inventory = lines.map(line => {
                    const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return parts.length > 1 ? { name: parts[1].replace(/"/g, '').trim(), price: parts[3] } : null;
                }).filter(x => x);
            } catch (err) { console.error("Search fetch failed", err); }
        }
        loadInventory();

        function filterResults() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            if(!query) return;

            const filtered = inventory.filter(item => item.name.toLowerCase().includes(query));
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML = `<span>${item.name}</span><span style="color:var(--accent-gold)">₦${Number(item.price).toLocaleString()}</span>`;
                div.onclick = () => window.location.href = 'shop.html';
                list.appendChild(div);
            });
        }

        // 2. Toggles
        function toggleSearch() {
            document.getElementById('search-box').classList.toggle('active');
            if(document.getElementById('search-box').classList.contains('active')) {
                document.getElementById('search-input').focus();
            }
        }

        // 3. Header Scroll
        window.addEventListener('scroll', () => {
            const h = document.getElementById('main-header');
            if (window.scrollY > 80) h.classList.add('scrolled');
            else h.classList.remove('scrolled');
        });

        // 4. Date
        function updateDate() {
            const opt = { weekday: 'short', month: 'short', day: 'numeric' };
            document.getElementById('live-date').innerText = new Date().toLocaleDateString('en-US', opt);
        }
        setInterval(updateDate, 1000); updateDate();
    </script>
</body>
</html>
