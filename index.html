<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Chinzy Luxury Jeweries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC;     
            --surface-white: #FFFFFF; 
            --text-dark: #1A1A1A;     
            --text-muted: #666666;
            --accent-gold: #C5A059;   
            --gold-glow: rgba(197, 160, 89, 0.15); 
            --border-radius: 4px;     
            --transition-speed: 0.4s;
        }

        body {
            font-family: 'Work Sans', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: var(--bg-pearl);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- HEADER STYLES --- */
        header {
            background-color: var(--surface-white);
            box-shadow: 0 2px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all var(--transition-speed) ease;
        }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; transition: all var(--transition-speed) ease;
        }

        .header-left img { height: 55px; width: auto; transition: height var(--transition-speed) ease; }
        .header-center { text-align: center; flex-grow: 1; }
        .header-center img { height: 45px; width: auto; transition: height var(--transition-speed) ease; }
        .header-right { text-align: right; min-width: 150px; }

        #datetime-display {
            font-size: 0.8rem; color: var(--text-muted); display: block;
            font-weight: 400; text-transform: uppercase; letter-spacing: 1.5px;
        }

        .header-bottom {
            display: flex; justify-content: flex-end; align-items: center; 
            padding: 15px 40px; border-top: 1px solid #F0F0F0; position: relative;
            transition: all var(--transition-speed) ease; text-transform: uppercase;
        }

        .nav-links {
            position: absolute; left: 50%; transform: translateX(-50%);
            display: flex; gap: 35px; list-style: none; padding: 0; margin: 0;
            transition: all var(--transition-speed) ease; align-items: center;
            width: max-content;
        }

        .nav-links li a {
            text-decoration: none; color: var(--text-dark);
            font-weight: 300; font-size: 0.95rem; letter-spacing: 2px; 
            position: relative; padding-bottom: 5px;
            transition: all var(--transition-speed) ease;
        }

        .nav-links li a:hover, .nav-links li a.active { color: var(--accent-gold); }
        .nav-links li a.active::after {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 100%; height: 1px; background-color: var(--accent-gold);
        }

        .dropdown-parent { position: relative; }
        .dropdown {
            display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            background: var(--surface-white); box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            list-style: none; padding: 15px 0; margin: 0; min-width: 180px; z-index: 100;
            border: 1px solid #F0F0F0; border-radius: 4px;
        }
        .dropdown-parent:hover .dropdown { display: block; }
        .dropdown li a { display: block; padding: 10px 20px; font-size: 0.85rem; letter-spacing: 1.5px; }

        .action-icons { display: flex; align-items: center; gap: 25px; position: relative; }

        .search-container { position: relative; display: flex; align-items: center; justify-content: flex-end; }
        .search-input {
            position: absolute; right: 0; width: 0; padding: 0;
            border: none; outline: none; background: var(--surface-white);
            transition: width 0.4s ease, padding 0.4s ease, opacity 0.4s ease;
            font-family: 'Work Sans', sans-serif; font-weight: 300;
            text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
            z-index: 10; opacity: 0; pointer-events: none; 
        }
        .search-container.active .search-input {
            width: 200px; padding: 8px 35px 8px 10px; border-bottom: 1px solid var(--accent-gold);
            opacity: 1; pointer-events: auto; box-shadow: -15px 0 15px var(--surface-white); 
        }
        .search-icon { cursor: pointer; font-size: 0.95rem; color: var(--text-dark); transition: color 0.3s; position: relative; z-index: 11; font-weight: 300; }

        .cart-wrapper { display: flex; align-items: center; gap: 5px; font-weight: 300; color: var(--text-dark); cursor: pointer; letter-spacing: 1px; font-size: 0.95rem; }

        /* --- SCROLLED STATE --- */
        header.scrolled .header-top { padding: 5px 40px; }
        header.scrolled .header-center img { height: 28px; }
        header.scrolled .header-left img { height: 35px; }
        header.scrolled .header-bottom { padding: 5px 40px; }
        header.scrolled .nav-links li a { font-size: 0.8rem; }
        .scrolled-brand { display: none; height: 35px; position: absolute; left: 40px; }
        header.scrolled .scrolled-brand { display: block; }

        /* --- MAIN CONTENT --- */
        main { padding: 50px 40px; max-width: 1400px; margin: auto; }

        h2.section-title {
            text-align: center; color: var(--text-dark); font-size: 2.5rem;
            margin-bottom: 40px; margin-top: 60px; font-family: 'Playfair Display', serif; 
            font-weight: 400; letter-spacing: 1px;
        }
        h2.section-title::after {
            content: ''; display: block; width: 60px; height: 1px;
            background-color: var(--accent-gold); margin: 15px auto 0;
        }

        /* 1. New Arrivals Carousel */
        .carousel-container { width: 100%; overflow: hidden; position: relative; padding: 30px 0; }
        .carousel-track { display: flex; transform: translateX(0); }
        .carousel-track img {
            width: 280px; height: 350px; object-fit: cover; border-radius: var(--border-radius); 
            margin: 0 20px; box-shadow: 0 10px 25px var(--gold-glow); 
            transition: transform 0.5s ease; background: var(--surface-white);
        }

        /* 2. Landscape Video - 500px Height */
        .video-container {
            width: 100%; max-width: 1200px; margin: 0 auto; height: 500px; 
            border-radius: var(--border-radius); overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); border: 1px solid #EAEAEA;
        }
        .video-container video { 
            width: 100%; height: 100%; object-fit: cover; /* Keeps it portrait/landscape centered */
        }

        /* 3. Testimonials - 3 Column Staggered Fade */
        .testimony-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin: 40px 0;
        }
        .testimony-box {
            height: 400px;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 10px 25px var(--gold-glow);
            background: var(--surface-white);
            position: relative;
        }
        .testimony-box img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 1.5s ease-in-out;
        }
        .testimony-box img.visible { opacity: 1; }

        @media (max-width: 800px) {
            .testimony-grid { grid-template-columns: 1fr; }
            .video-container { height: 300px; }
            main { padding: 30px 20px; }
            .nav-links { position: relative; left: 0; transform: none; gap: 15px; margin-right: auto; }
            .header-top { display: none; }
            .scrolled-brand { display: block; position: static; height: 25px; margin-right: 15px; }
            .header-bottom { justify-content: space-between; padding: 10px 20px; }
        }

        footer {
            background-color: var(--surface-white); color: var(--text-dark); text-align: center;
            padding: 50px 20px 30px; margin-top: 80px; border-top: 1px solid #F0F0F0;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            font-weight: 300; text-transform: uppercase; letter-spacing: 1px;
        }
        .whatsapp-link {
            display: inline-flex; align-items: center; justify-content: center;
            width: 55px; height: 55px; background-color: #25D366; color: white;
            border-radius: 50%; font-size: 1.8rem; text-decoration: none;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <div class="header-left"><img src="logo/logo.jpg" alt="Logo"></div>
            <div class="header-center"><img src="brand/brandname.jpg" alt="Brand"></div>
            <div class="header-right"><span id="datetime-display"></span></div>
        </div>
        <div class="header-bottom">
            <img class="scrolled-brand" src="brand/brandname.jpg" alt="Brand">
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li class="dropdown-parent">
                    <a href="javascript:void(0)">More <i class="fas fa-chevron-down" style="font-size: 0.7em;"></i></a>
                    <ul class="dropdown">
                        <li><a href="services.html">Services</a></li>
                        <li><a href="about.html">About Us</a></li>
                        <li><a href="contact.html">Contact Us</a></li>
                    </ul>
                </li>
            </ul>
            <div class="action-icons">
                <div class="search-container" id="search-box">
                    <input type="text" class="search-input" id="search-input" placeholder="SEARCH...">
                    <i class="fas fa-search search-icon" onclick="toggleSearch()"></i>
                </div>
                <div class="cart-wrapper" onclick="window.location.href='shop.html'">
                    <i class="fas fa-shopping-cart" style="font-size:0.95rem;"></i> (<span id="cart-count">0</span>)
                </div>
            </div>
        </div>
    </header>

    <main>
        <h2 class="section-title">New Arrivals</h2>
        <div class="carousel-container">
            <div class="carousel-track" id="product-track">
                <script>
                    for(let i=1; i<=10; i++) document.write(`<img src="products/prod${i}.jpg" onerror="this.style.display='none'">`);
                    for(let i=1; i<=10; i++) document.write(`<img src="products/prod${i}.jpg" onerror="this.style.display='none'">`);
                </script>
            </div>
        </div>

        <h2 class="section-title">Experience Luxury</h2>
        <div class="video-container">
            <video autoplay muted loop playsinline poster="video/video_thumb.jpg">
                <source src="video/office_tour.mp4" type="video/mp4">
            </video>
        </div>

        <h2 class="section-title">What Our Clients Say</h2>
        <div class="testimony-grid">
            <div class="testimony-box" id="box-1">
                <img src="test/test1.jpg" class="visible" id="img-1">
                <img src="test/test2.jpg" id="img-2">
            </div>
            <div class="testimony-box" id="box-2">
                <img src="test/test3.jpg" class="visible" id="img-3">
                <img src="test/test4.jpg" id="img-4">
            </div>
            <div class="testimony-box" id="box-3">
                <img src="test/test5.jpg" class="visible" id="img-5">
                <img src="test/test6.jpg" id="img-6">
            </div>
        </div>
    </main>

    <footer>
        <div>&copy; <span id="current-year"></span> CHINZY LUXURY JEWERIES.</div>
        <a href="https://wa.me/2349057835662" class="whatsapp-link" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script>
        // 1. Time Update
        function updateTime() {
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('datetime-display').innerText = now.toLocaleDateString('en-US', options);
            document.getElementById('current-year').innerText = now.getFullYear();
        }
        setInterval(updateTime, 1000); updateTime();

        // 2. Sticky Header
        window.addEventListener('scroll', () => {
            const head = document.getElementById('main-header');
            if (window.scrollY > 50) head.classList.add('scrolled');
            else head.classList.remove('scrolled');
        });

        // 3. New Arrivals Snap Scroll (5s)
        const track = document.getElementById('product-track');
        let currentSlide = 0;
        setInterval(() => {
            currentSlide++;
            track.style.transition = 'transform 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
            track.style.transform = `translateX(-${currentSlide * 320}px)`;
            if (currentSlide === 10) {
                setTimeout(() => {
                    track.style.transition = 'none';
                    currentSlide = 0;
                    track.style.transform = `translateX(0)`;
                }, 800);
            }
        }, 5000);

        // 4. Staggered Testimonial Fades (Random-ish)
        function rotateBox(boxId, imgA, imgB) {
            const a = document.getElementById(imgA);
            const b = document.getElementById(imgB);
            if (a.classList.contains('visible')) {
                a.classList.remove('visible'); b.classList.add('visible');
            } else {
                b.classList.remove('visible'); a.classList.add('visible');
            }
        }

        // Each box rotates at a slightly different interval for "random" feel
        setInterval(() => rotateBox('box-1', 'img-1', 'img-2'), 4000);
        setInterval(() => rotateBox('box-2', 'img-3', 'img-4'), 5500);
        setInterval(() => rotateBox('box-3', 'img-5', 'img-6'), 7000);

        function toggleSearch() {
            document.getElementById('search-box').classList.toggle('active');
            document.getElementById('search-input').focus();
        }
    </script>
</body>
</html>
