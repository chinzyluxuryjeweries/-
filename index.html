<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinzy Luxury Jeweries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC;     
            --surface-white: #FFFFFF; 
            --text-dark: #1A1A1A;     
            --accent-gold: #C5A059;   
            --transition-speed: 0.5s;
            
            /* SIZING HIERARCHY (Luxury Math) */
            --brand-h-mobile: 22px; /* The King */
            --sub-h-mobile: 21px;   /* 1px Smaller than King */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Work Sans', sans-serif; margin: 0; background: var(--bg-pearl); overflow-x: hidden; }

        header {
            background: var(--surface-white);
            position: sticky; top: 0; z-index: 2000;
            width: 100%;
            box-shadow: 0 2px 20px rgba(0,0,0,0.02);
            transition: var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- ROW 1: BRAND DOMINANCE --- */
        .branding-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            height: 90px;
            transition: var(--transition-speed);
        }

        .date-box { 
            flex: 1; 
            font-size: 0.65rem; 
            color: #999; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            height: var(--sub-h-mobile); /* 1px smaller than brand */
        }

        .brand-center { 
            flex: 2; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .brand-center img { 
            height: var(--brand-h-mobile); /* THE BIGGEST ELEMENT */
            width: auto;
            transition: 0.3s;
        }

        .icons-right { 
            flex: 1; 
            display: flex; 
            justify-content: flex-end; 
            gap: 20px; 
            color: var(--text-dark);
            height: var(--sub-h-mobile); /* 1px smaller than brand container */
            align-items: center;
        }
        .icons-right i {
            font-size: 0.95rem; /* Visually matches the sub-height */
        }

        /* --- ROW 2: NAVIGATION --- */
        .nav-row {
            padding: 15px 5%;
            border-top: 1px solid #F0F0F0;
            display: flex;
            justify-content: center;
            transition: var(--transition-speed);
            position: relative;
        }

        .nav-links {
            display: flex; gap: 30px; list-style: none; padding: 0; margin: 0;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .nav-links a { 
            text-decoration: none; color: var(--text-dark); 
            font-size: 0.85rem; font-weight: 300; 
            transition: all 0.3s;
        }

        /* --- MORPH STATE (SCROLLED) --- */
        header.scrolled { transform: translateY(-90px); } 

        /* Logo Peek: Smaller on scroll to let Nav be "Bigger" */
        .logo-peek {
            position: absolute; left: 5%;
            opacity: 0; transform: translateX(-15px);
            transition: 0.4s; pointer-events: none;
            display: flex; align-items: center;
        }
        header.scrolled .logo-peek { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .logo-peek img { 
            height: 18px; /* Specifically smaller than the Nav/Icons now */
        }

        /* Nav links & Icons can be bigger than the logo icon here */
        header.scrolled .nav-links a { 
            font-size: calc(0.85rem - 2px); 
            letter-spacing: 1px;
        }

        .icons-peek {
            position: absolute; right: 5%;
            opacity: 0; transform: translateX(15px);
            transition: 0.4s; pointer-events: none;
            display: flex; gap: 20px;
            align-items: center;
        }
        header.scrolled .icons-peek { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .icons-peek i { font-size: 1rem; } /* Larger than the 18px logo icon */

        /* --- SEARCH DRAWER --- */
        .search-drawer {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: white; border-top: 1px solid #eee;
            padding: 20px; transform: translateY(-100%);
            opacity: 0; transition: 0.4s; z-index: -1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .search-drawer.open { transform: translateY(0); opacity: 1; }
        .search-input {
            width: 100%; border: none; border-bottom: 1px solid var(--accent-gold);
            padding: 10px; font-family: 'Work Sans'; font-size: 1.1rem; outline: none;
            text-align: center; text-transform: uppercase;
        }

        /* --- 340 DPI RESPONSIVENESS --- */
        @media (max-width: 380px) {
            :root {
                --brand-h-mobile: 18px; /* Scaled for 340dpi */
                --sub-h-mobile: 17px;
            }
            .branding-row { height: 80px; }
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.75rem; }
            header.scrolled { transform: translateY(-80px); }
            header.scrolled .nav-links a { font-size: calc(0.75rem - 2px); }
        }

        .video-box { width: 100%; height: 250px; background: #000; overflow: hidden; border-radius: 4px; margin: 40px 0; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="branding-row">
            <div class="date-box" id="current-date"></div>
            
            <div class="brand-center">
                <img src="brand/brandname.jpg" alt="Chinzy Luxury">
            </div>

            <div class="icons-right">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <i class="fas fa-shopping-cart" onclick="window.location.href='shop.html'"></i>
            </div>
        </div>

        <nav class="nav-row">
            <div class="logo-peek">
                <img src="logo/logo.jpg" alt="L">
            </div>

            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
            </ul>

            <div class="icons-peek">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <i class="fas fa-shopping-cart" onclick="window.location.href='shop.html'"></i>
            </div>
        </nav>

        <div class="search-drawer" id="search-drawer">
            <input type="text" class="search-input" id="search-field" placeholder="SEARCH COLLECTION...">
            <div id="results-list" style="max-height:250px; overflow-y:auto; margin-top:15px;"></div>
        </div>
    </header>

    <main style="padding: 20px 5%; min-height: 2000px;">
        <div class="video-box">
            <video autoplay muted loop playsinline><source src="video/office_tour.mp4" type="video/mp4"></video>
        </div>
        <p style="text-align:center; color:#ccc;">Scroll to experience the hierarchical morph...</p>
    </main>

    <script>
        function setDate() {
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', options);
        }
        setInterval(setDate, 1000); setDate();

        function toggleSearch() {
            const dr = document.getElementById('search-drawer');
            dr.classList.toggle('open');
            if(dr.classList.contains('open')) document.getElementById('search-field').focus();
        }

        window.addEventListener('scroll', () => {
            const h = document.getElementById('main-header');
            if (window.scrollY > 80) h.classList.add('scrolled');
            else h.classList.remove('scrolled');
        });

        function runSearch() {
            const val = document.getElementById('search-field').value.toLowerCase();
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            if(!val) return;
            // Simulated search logic...
        }
    </script>
</body>
</html>
