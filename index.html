<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHINZY JEWERIES | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Modak&family=Playfair+Display:wght@400&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC; --surface: #FFFFFF; --text: #1A1A1A; 
            --accent: #C5A059; --transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            --brand-sz: 28px;
            --glow: rgba(197, 160, 89, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Work Sans', sans-serif; margin: 0; background: var(--bg-pearl); overflow-x: hidden; }

        /* --- THE MINIMALIST HEADER --- */
        header { background: var(--surface); position: sticky; top: 0; z-index: 2000; width: 100%; transition: var(--transition); box-shadow: 0 2px 20px rgba(0,0,0,0.02); }
        .branding-area { display: flex; align-items: center; justify-content: center; padding: 5px 5%; height: 70px; transition: var(--transition); }
        .brand-text { font-family: 'Modak', cursive; font-size: var(--brand-sz); color: var(--text); white-space: nowrap; transition: var(--transition); letter-spacing: 1px; }

        .nav-hub { padding: 10px 5%; border-top: 1px solid #F0F0F0; display: flex; flex-direction: column; align-items: center; transition: var(--transition); }
        .nav-main-line { display: flex; justify-content: space-between; align-items: center; width: 100%; transition: var(--transition); }
        .nav-links { display: flex; gap: 20px; list-style: none; padding: 0; margin: 0; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.8rem; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; }
        .nav-links a.active { color: var(--accent); font-weight: 500; border-bottom: 1px solid var(--accent); }
        
        .hub-icon-wrap { position: relative; cursor: pointer; }
        .cart-count { position: absolute; top: -8px; right: -10px; background: var(--accent); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; font-weight: 600; }

        .icon-stack-line { display: flex; gap: 30px; height: 0; opacity: 0; overflow: hidden; transition: var(--transition); }

        /* MORPH LOGIC */
        header.scrolled .branding-area { height: 0; padding: 0; opacity: 0; pointer-events: none; }
        header.scrolled .nav-main-line .hub-icon-wrap, 
        header.scrolled .nav-main-line .fa-magnifying-glass { display: none; }
        header.scrolled .nav-main-line { justify-content: center; }
        header.scrolled .icon-stack-line { height: 35px; opacity: 1; margin-top: 5px; overflow: visible; justify-content: center; align-items: center; }

        /* --- SEARCH PANEL --- */
        #search-panel { position: fixed; top: -100%; left: 0; width: 100%; background: white; z-index: 3000; padding: 40px 5%; transition: 0.5s; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #search-panel.active { top: 0; }
        .search-input { width: 100%; border: none; border-bottom: 2px solid var(--accent); font-size: 1.2rem; padding: 10px; outline: none; font-family: 'Work Sans'; text-align: center; text-transform: uppercase; }
        #search-results { max-height: 300px; overflow-y: auto; margin-top: 20px; }
        .search-res-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; cursor: pointer; }

        /* --- ENDLESS LOOP ARRIVALS (200x170) --- */
        .arrivals-section { padding: 15px 0 30px; overflow: hidden; } /* Reduced space from header */
        .carousel-outer { width: 100%; display: flex; overflow: hidden; }
        .track { display: flex; gap: 15px; padding: 0 15px; transition: transform 0.6s ease; }
        .track img { width: 200px; height: 300px; object-fit: cover; border-radius: 4px; flex-shrink: 0; transition: 0.3s; }

        /* --- CEO VIDEO --- */
        .ceo-section { padding: 30px 5%; text-align: center; }
        .video-caption { font-family: 'Playfair Display'; font-size: 1.3rem; margin-bottom: 15px; color: var(--text); font-weight: 400; }
        .video-container { width: 100%; height: 250px; background: #000; position: relative; border-radius: 8px; overflow: hidden; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .mute-toggle { position: absolute; bottom: 15px; right: 15px; background: rgba(255,255,255,0.9); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }

        /* --- TESTIMONIALS (170x220) --- */
        .test-section { display: flex; justify-content: center; gap: 20px; padding: 30px 5%; }
        .test-box { 
            width: 220px; height: 290px; position: relative; overflow: hidden; 
            border-radius: 8px; box-shadow: 0 0 20px var(--glow); 
        }
        .test-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transition: 1.5s ease-in-out; }
        .test-box img.visible { opacity: 1; }

        /* --- FLOATING WHATSAPP --- */
        .whatsapp-float { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #25D366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 3000; text-decoration: none; }

        footer { text-align: center; padding: 40px; color: #999; font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="search-panel">
        <input type="text" class="search-input" id="s-in" placeholder="Find your sparkle..." oninput="doSearch()">
        <div id="search-results"></div>
        <div style="text-align:center; margin-top:20px; cursor:pointer;" onclick="toggleSearch()"><i class="fas fa-times"></i> CLOSE</div>
    </div>

    <header id="main-header">
        <div class="branding-area"><a href="index.html" class="brand-text" style="text-decoration: none;">CHINZY JEWERIES</a></div>
        <nav class="nav-hub">
            <div class="nav-main-line">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <ul class="nav-links">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
                <div class="hub-icon-wrap" onclick="window.location.href='shop.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count sync-cart">0</span>
                </div>
            </div>
            <div class="icon-stack-line">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()" style="font-size:1.1rem"></i>
                <div class="hub-icon-wrap" onclick="window.location.href='shop.html'">
                    <i class="fas fa-shopping-cart" style="font-size:1.1rem"></i>
                    <span class="cart-count sync-cart">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="arrivals-section">
            <h2 style="text-align:center; font-family:'Playfair Display'; font-weight:400; margin-bottom:15px;">New Arrivals</h2>
            <div class="carousel-outer">
                <div class="track" id="loop-track">
                    <img src="products/prod1.jpg" alt="1">
                    <img src="products/prod2.jpg" alt="2">
                    <img src="products/prod3.jpg" alt="3">
                    <img src="products/prod4.jpg" alt="4">
                    <img src="products/prod5.jpg" alt="5">
                </div>
            </div>
        </section>

        <section class="ceo-section">
            <p class="video-caption">A word from our CEO</p>
            <div class="video-container">
                <video id="ceo-vid" autoplay muted loop playsinline><source src="video/office_tour.mp4" type="video/mp4"></video>
                <div class="mute-toggle" onclick="toggleMute()"><i id="mute-icon" class="fas fa-volume-xmark"></i></div>
            </div>
        </section>

        <h2 style="text-align:center; font-family:'Playfair Display'; font-weight:400; margin-top:30px;">Hear from our Clients</h2>
        <section class="test-section">
            <div class="test-box" id="box1"></div>
            <div class="test-box" id="box2"></div>
        </section>
    </main>

    <a href="https://wa.me/2349057835662" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <footer>&copy; 2026 CHINZY LUXURY</footer>

    <script>
        // 1. ENDLESS RE-QUEUE LOOP (New Arrivals)
        const track = document.getElementById('loop-track');
        function snapLoop() {
            const firstImg = track.querySelector('img');
            const itemWidth = 215; // 200px + 15px gap
            
            track.style.transition = "transform 0.6s ease";
            track.style.transform = `translateX(-${itemWidth}px)`;

            setTimeout(() => {
                track.style.transition = "none";
                track.appendChild(firstImg); // Move first to back
                track.style.transform = "translateX(0)";
            }, 600);
        }
        setInterval(snapLoop, 3500);

        // 2. SEARCH ENGINE
        const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTgYE39QUtAj5Ewhjr4J8zbC_ZEknbMRJ5gp5V6wlBXWqa9mvbPf9qrmYnqkdR_rSvumbUhAp0F6ef/pub?gid=895459828&single=true&output=csv';
        let inventory = [];

        async function loadInv() {
            const r = await fetch(CSV); const t = await r.text();
            inventory = t.split('\n').slice(1).map(l => {
                const p = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return p.length > 1 ? { n: p[1].replace(/"/g, ''), p: p[3] } : null;
            }).filter(x => x);
        }
        loadInv();

        function toggleSearch() { document.getElementById('search-panel').classList.toggle('active'); }

        function doSearch() {
            const q = document.getElementById('s-in').value.toLowerCase();
            const res = document.getElementById('search-results');
            res.innerHTML = '';
            if(!q) return;
            inventory.filter(i => i.n.toLowerCase().includes(q)).forEach(i => {
                const div = document.createElement('div');
                div.className = 'search-res-item';
                div.innerHTML = `<span>${i.n}</span><b>₦${Number(i.p).toLocaleString()}</b>`;
                div.onclick = () => window.location.href = 'shop.html';
                res.appendChild(div);
            });
        }

        // 3. FADE TESTIMONIALS (With 170x220 Glow)
        const tImgs = ['test/test1.jpg','test/test2.jpg','test/test3.jpg','test/test4.jpg','test/test5.jpg','test/test6.jpg'];
        function setupFade(id, s, e) {
            const b = document.getElementById(id);
            tImgs.slice(s, e).forEach((src, i) => {
                const img = document.createElement('img'); img.src = src;
                if(i === 0) img.classList.add('visible');
                b.appendChild(img);
            });
            let cur = 0;
            setInterval(() => {
                const p = b.querySelectorAll('img');
                p[cur].classList.remove('visible');
                cur = (cur + 1) % p.length;
                p[cur].classList.add('visible');
            }, 4000);
        }
        setupFade('box1', 0, 3); setupFade('box2', 3, 6);

        // 4. GENERAL
        function toggleMute() {
            const v = document.getElementById('ceo-vid');
            v.muted = !v.muted;
            document.getElementById('mute-icon').classList.toggle('fa-volume-xmark');
            document.getElementById('mute-icon').classList.toggle('fa-volume-high');
        }

        window.onscroll = () => { document.getElementById('main-header').classList.toggle('scrolled', window.scrollY > 50); };
        
        function sync() {
            const c = localStorage.getItem('cartCount') || 0;
            document.querySelectorAll('.sync-cart').forEach(e => e.innerText = c);
        }
        window.onload = sync;
        window.addEventListener('storage', sync);
    </script>
</body>
</html>
