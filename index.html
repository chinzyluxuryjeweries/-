<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHINZY JEWERIES | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Modak&family=Playfair+Display:wght@400&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC; --surface: #FFFFFF; --text: #1A1A1A; 
            --accent: #C5A059; --transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            --brand-sz: 28px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Work Sans', sans-serif; margin: 0; background: var(--bg-pearl); overflow-x: hidden; }

        /* --- MINIMALIST MODAK HEADER --- */
        header { background: var(--surface); position: sticky; top: 0; z-index: 2000; width: 100%; transition: var(--transition); box-shadow: 0 2px 20px rgba(0,0,0,0.02); }
        .branding-area { display: flex; align-items: center; justify-content: center; padding: 15px 5%; height: 80px; transition: var(--transition); }
        .brand-text { font-family: 'Modak', cursive; font-size: var(--brand-sz); color: var(--text); white-space: nowrap; transition: var(--transition); letter-spacing: 1px; }

        .nav-hub { padding: 12px 5%; border-top: 1px solid #F0F0F0; display: flex; flex-direction: column; align-items: center; transition: var(--transition); }
        .nav-main-line { display: flex; justify-content: space-between; align-items: center; width: 100%; transition: var(--transition); }
        .nav-links { display: flex; gap: 25px; list-style: none; padding: 0; margin: 0; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.85rem; font-weight: 300; text-transform: uppercase; letter-spacing: 1.5px; }
        .nav-links a.active { color: var(--accent); font-weight: 500; border-bottom: 1px solid var(--accent); }
        
        .hub-icon-wrap { position: relative; cursor: pointer; }
        .cart-count { position: absolute; top: -8px; right: -10px; background: var(--accent); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; font-weight: 600; }

        .icon-stack-line { display: flex; gap: 30px; height: 0; opacity: 0; overflow: hidden; transition: var(--transition); }

        /* MORPH LOGIC */
        header.scrolled .branding-area { height: 0; padding: 0; opacity: 0; pointer-events: none; }
        header.scrolled .nav-main-line .hub-icon-wrap, 
        header.scrolled .nav-main-line .fa-magnifying-glass { display: none; }
        header.scrolled .nav-main-line { justify-content: center; }
        header.scrolled .icon-stack-line { height: 35px; opacity: 1; margin-top: 10px; overflow: visible; justify-content: center; align-items: center; }

        /* --- INFINITE LOOP ARRIVALS --- */
        .arrivals-section { padding: 40px 0; overflow: hidden; }
        .carousel-outer { width: 100%; display: flex; justify-content: center; }
        .track { display: flex; gap: 15px; transition: transform 0.5s ease; }
        .track img { width: 200px; height: 170px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }

        /* --- CEO VIDEO --- */
        .ceo-section { padding: 40px 5%; text-align: center; }
        .video-container { width: 100%; height: 250px; background: #000; position: relative; border-radius: 8px; overflow: hidden; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .video-caption { font-family: 'Playfair Display'; font-style: italic; margin-top: 15px; color: #555; }
        .mute-toggle { position: absolute; bottom: 15px; right: 15px; background: rgba(255,255,255,0.9); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }

        /* --- FADE TESTIMONIALS (2 BOXES) --- */
        .test-section { display: flex; justify-content: center; gap: 20px; padding: 40px 5%; }
        .test-box { width: 150px; height: 220px; position: relative; overflow: hidden; border-radius: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .test-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transition: 1.5s ease-in-out; }
        .test-box img.visible { opacity: 1; }

        /* --- FLOATING WHATSAPP --- */
        .whatsapp-float { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #25D366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 3000; text-decoration: none; transition: 0.3s; }
        .whatsapp-float:active { transform: scale(0.9); }

        @media (max-width: 400px) {
            .brand-text { font-size: 22px; }
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="branding-area"><div class="brand-text">CHINZY JEWERIES</div></div>
        <nav class="nav-hub">
            <div class="nav-main-line">
                <i class="fas fa-magnifying-glass" onclick="window.location.href='shop.html'"></i>
                <ul class="nav-links">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
                <div class="hub-icon-wrap" onclick="window.location.href='shop.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count sync-cart">0</span>
                </div>
            </div>
            <div class="icon-stack-line">
                <i class="fas fa-magnifying-glass" onclick="window.location.href='shop.html'" style="font-size:1.1rem"></i>
                <div class="hub-icon-wrap" onclick="window.location.href='shop.html'">
                    <i class="fas fa-shopping-cart" style="font-size:1.1rem"></i>
                    <span class="cart-count sync-cart">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="arrivals-section">
            <h2 style="text-align:center; font-family:'Playfair Display'; font-weight:400;">New Arrivals</h2>
            <div class="carousel-outer">
                <div class="track" id="loop-track">
                    <!-- Images will be cloned here for infinite loop -->
                </div>
            </div>
        </section>

        <section class="ceo-section">
            <div class="video-container">
                <video id="ceo-vid" autoplay muted loop playsinline><source src="video/office_tour.mp4" type="video/mp4"></video>
                <div class="mute-toggle" onclick="toggleMute()"><i id="mute-icon" class="fas fa-volume-xmark"></i></div>
            </div>
            <p class="video-caption">"A word from our CEO"</p>
        </section>

        <h2 style="text-align:center; font-family:'Playfair Display'; font-weight:400; margin-top:40px;">Hear from our Clients</h2>
        <section class="test-section">
            <div class="test-box" id="box1"></div>
            <div class="test-box" id="box2"></div>
        </section>
    </main>

    <a href="https://wa.me/2349057835662" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <footer>&copy; 2026 CHINZY LUXURY</footer>

    <script>
        // 1. INFINITE LOOP LOGIC
        const rawImages = ['products/prod1.jpg','products/prod2.jpg','products/prod3.jpg','products/prod4.jpg','products/prod5.jpg'];
        const track = document.getElementById('loop-track');
        
        // Clone images to ensure no gaps
        const fullList = [...rawImages, ...rawImages, ...rawImages];
        fullList.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            track.appendChild(img);
        });

        let pos = 0;
        function move() {
            pos++;
            const itemWidth = 215; // 200 width + 15 gap
            track.style.transition = "transform 0.5s ease";
            track.style.transform = `translateX(-${pos * itemWidth}px)`;

            // Reset silently when we hit the end of the second set
            if (pos >= rawImages.length * 2) {
                setTimeout(() => {
                    track.style.transition = "none";
                    pos = rawImages.length;
                    track.style.transform = `translateX(-${pos * itemWidth}px)`;
                }, 500);
            }
        }
        setInterval(move, 3000);

        // 2. VIDEO MUTE
        function toggleMute() {
            const v = document.getElementById('ceo-vid');
            const i = document.getElementById('mute-icon');
            v.muted = !v.muted;
            i.classList.toggle('fa-volume-xmark');
            i.classList.toggle('fa-volume-high');
        }

        // 3. FADE TESTIMONIALS (2 BOXES)
        const tImgs = ['test/test1.jpg','test/test2.jpg','test/test3.jpg','test/test4.jpg','test/test5.jpg','test/test6.jpg'];
        function setupFade(containerId, startIdx, endIdx) {
            const cont = document.getElementById(containerId);
            const slice = tImgs.slice(startIdx, endIdx);
            slice.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src;
                if(i === 0) img.classList.add('visible');
                cont.appendChild(img);
            });

            let current = 0;
            setInterval(() => {
                const pics = cont.getElementsByTagName('img');
                pics[current].classList.remove('visible');
                current = (current + 1) % pics.length;
                pics[current].classList.add('visible');
            }, 4000);
        }
        setupFade('box1', 0, 3);
        setupFade('box2', 3, 6);

        // 4. CART SYNC & MORPH
        window.onscroll = () => { document.getElementById('main-header').classList.toggle('scrolled', window.scrollY > 60); };

        function syncCart() {
            const count = localStorage.getItem('cartCount') || 0;
            document.querySelectorAll('.sync-cart').forEach(el => el.innerText = count);
        }
        window.onload = syncCart;
        window.addEventListener('storage', syncCart); // Listen for changes from shop page
    </script>
</body>
</html>
