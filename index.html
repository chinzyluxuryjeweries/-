<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinzy Luxury Jeweries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pearl: #FCFCFC;     
            --surface-white: #FFFFFF; 
            --text-dark: #1A1A1A;     
            --accent-gold: #C5A059;   
            --transition-main: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Work Sans', sans-serif; margin: 0; background: var(--bg-pearl); overflow-x: hidden; }

        /* --- THE BOUTIQUE RIBBON --- */
        header {
            background: var(--surface-white);
            position: sticky; top: 0; z-index: 2000;
            width: 100%;
            box-shadow: 0 2px 20px rgba(0,0,0,0.02);
            transition: var(--transition-main);
        }

        /* ROW 1: Branding Area - Fixed to prevent stacking */
        .branding-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            height: 85px;
            transition: var(--transition-main);
            gap: 10px;
        }

        .date-box { 
            flex: 1;
            font-size: 0.6rem; 
            color: #999; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* The Fix: logo-center now forces a single horizontal line */
        .logo-center { 
            flex: 3;
            display: flex; 
            flex-direction: row; /* Forces Brand Name next to Logo */
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }
        .logo-center .main-logo { height: 35px; width: auto; flex-shrink: 1; }
        .logo-center .brand-name { height: 14px; width: auto; flex-shrink: 1; }

        .icons-right { 
            flex: 1;
            display: flex; 
            justify-content: flex-end; 
            gap: 15px; 
            font-size: 0.9rem; 
        }

        /* ROW 2: Navigation */
        .nav-row {
            padding: 12px 5%;
            border-top: 1px solid #F0F0F0;
            display: flex;
            justify-content: center;
            transition: var(--transition-main);
            position: relative;
        }
        .nav-links {
            display: flex; gap: 25px; list-style: none; padding: 0; margin: 0;
            text-transform: uppercase; letter-spacing: 1.5px;
        }
        .nav-links a { 
            text-decoration: none; 
            color: var(--text-dark); 
            font-size: 0.8rem; /* Base size */
            font-weight: 300; 
            transition: font-size 0.3s ease;
        }

        /* --- THE MORPH (SCROLLED) --- */
        header.scrolled { transform: translateY(-85px); } 

        header.scrolled .nav-links a { 
            font-size: calc(0.8rem - 2px); /* THE 2PX SHRINK YOU REQUESTED */
            letter-spacing: 1px;
        }

        /* Brand Peek on left */
        .scroll-brand-peek {
            position: absolute; left: 5%; 
            opacity: 0; transform: translateX(-15px);
            transition: 0.4s; pointer-events: none;
            display: flex; align-items: center; gap: 5px;
        }
        header.scrolled .scroll-brand-peek { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .scroll-brand-peek img { height: 18px; }

        /* Icons Peek on right */
        .scroll-icons-peek {
            position: absolute; right: 5%;
            opacity: 0; transform: translateX(15px);
            transition: 0.4s; pointer-events: none;
            display: flex; gap: 15px; font-size: 0.8rem;
        }
        header.scrolled .scroll-icons-peek { opacity: 1; transform: translateX(0); pointer-events: auto; }

        /* --- SEARCH DRAWER --- */
        .search-drawer {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: white; border-top: 1px solid #eee;
            padding: 20px; transform: translateY(-100%);
            opacity: 0; transition: 0.4s; z-index: -1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .search-drawer.open { transform: translateY(0); opacity: 1; }
        .search-input {
            width: 100%; border: none; border-bottom: 1px solid var(--accent-gold);
            padding: 10px; font-family: 'Work Sans'; font-size: 1rem; outline: none;
            text-align: center; text-transform: uppercase;
        }

        /* --- 340 DPI PORTRAIT SPECIFIC --- */
        @media (max-width: 360px) {
            .branding-row { padding: 10px 3%; height: 75px; }
            .logo-center { gap: 5px; }
            .logo-center .main-logo { height: 28px; }
            .logo-center .brand-name { height: 11px; }
            
            .nav-links { gap: 12px; }
            .nav-links a { font-size: 0.7rem; }
            header.scrolled .nav-links a { font-size: calc(0.7rem - 2px); }
            
            header.scrolled { transform: translateY(-75px); }
            header.scrolled .nav-row { justify-content: center; padding-left: 15%; padding-right: 15%; }
        }

        /* Content Placeholder */
        .hero { height: 250px; background: #eee; margin: 15px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display'; }
        .spacer { height: 1200px; padding: 20px; color: #ccc; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="branding-row">
            <div class="date-box" id="live-date"></div>
            <div class="logo-center">
                <img src="logo/logo.jpg" class="main-logo" alt="Logo">
                <img src="brand/brandname.jpg" class="brand-name" alt="Chinzy Luxury">
            </div>
            <div class="icons-right">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <i class="fas fa-shopping-cart" onclick="window.location.href='shop.html'"></i>
            </div>
        </div>

        <nav class="nav-row">
            <div class="scroll-brand-peek">
                <img src="logo/logo.jpg" style="height:20px;" alt="L">
                <img src="brand/brandname.jpg" alt="Brand">
            </div>

            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
            </ul>

            <div class="scroll-icons-peek">
                <i class="fas fa-magnifying-glass" onclick="toggleSearch()"></i>
                <i class="fas fa-shopping-cart" onclick="window.location.href='shop.html'"></i>
            </div>
        </nav>

        <div class="search-drawer" id="search-drawer">
            <input type="text" class="search-input" id="search-field" placeholder="SEARCH PIECES...">
            <div id="results-area" style="max-height:200px; overflow-y:auto; padding-top:10px;"></div>
            <div style="text-align: center; margin-top: 10px;">
                <i class="fas fa-times" onclick="toggleSearch()" style="color:#ddd; font-size:0.8rem;"></i>
            </div>
        </div>
    </header>

    <main>
        <div class="hero"><h1>Chinzy Luxury</h1></div>
        <div class="spacer">Scroll down to see the navigation text shrink by 2px...</div>
    </main>

    <script>
        // Update Date
        function updateDate() {
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            document.getElementById('live-date').innerText = new Date().toLocaleDateString('en-US', options);
        }
        setInterval(updateDate, 1000); updateDate();

        // Header Morph
        window.addEventListener('scroll', () => {
            const h = document.getElementById('main-header');
            if (window.scrollY > 80) h.classList.add('scrolled');
            else h.classList.remove('scrolled');
        });

        // Search Toggle
        function toggleSearch() {
            document.getElementById('search-drawer').classList.toggle('open');
            if(document.getElementById('search-drawer').classList.contains('open')) {
                document.getElementById('search-field').focus();
            }
        }
    </script>
</body>
</html>
