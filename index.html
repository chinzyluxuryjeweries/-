<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Chinzy Luxury Jeweries</title>
    <!-- Using Font Awesome for the Search, Cart, and WhatsApp icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Variables for Theme */
        :root {
            --light-purple: #F3E5F5; /* Very light purple background */
            --dark-purple: #4A148C;  /* Accent color */
            --text-dark: #333333;
            --white: #ffffff;
            --border-radius: 12px;
            --transition-speed: 0.3s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-purple);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- HEADER STYLES --- */
        header {
            background-color: var(--white);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all var(--transition-speed) ease;
        }

        /* Top row of header (Logo, Brand Name, Date/Time) */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            transition: all var(--transition-speed) ease;
        }

        .header-left img {
            height: 50px;
            width: auto;
        }

        .header-center {
            text-align: center;
            flex-grow: 1;
            transition: all var(--transition-speed) ease;
        }

        .header-center img {
            height: 40px;
            width: auto;
            transition: all var(--transition-speed) ease;
        }

        .header-right {
            text-align: right;
            min-width: 150px; /* Ensure space for date/time */
        }

        #datetime-display {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
            display: block;
        }

        /* Bottom row of header (Navigation, Search, Cart) */
        .header-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px 15px;
            border-top: 1px solid #f0f0f0;
            transition: all var(--transition-speed) ease;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
            padding: 0;
            margin: 0;
            transition: all var(--transition-speed) ease;
        }

        .nav-links li a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 1.1rem;
            position: relative;
            padding-bottom: 5px;
            transition: color var(--transition-speed);
        }

        .nav-links li a:hover {
            color: var(--dark-purple);
        }

        /* The Glow/Identifier for active page */
        .nav-links li a.active {
            color: var(--dark-purple);
            text-shadow: 0 0 8px rgba(74, 20, 140, 0.4);
        }
        
        .nav-links li a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--dark-purple);
            box-shadow: 0 0 5px var(--dark-purple);
        }

        .action-icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Expandable Search */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 0;
            padding: 0;
            border: none;
            outline: none;
            background: transparent;
            transition: width 0.4s ease, padding 0.4s ease;
            font-size: 1rem;
            border-bottom: 1px solid transparent;
        }

        .search-container.active .search-input {
            width: 200px;
            padding: 5px 10px;
            border-bottom: 1px solid var(--dark-purple);
        }

        .search-icon, .cart-icon {
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-dark);
            transition: color var(--transition-speed);
        }

        /* Cart styling as requested */
        .cart-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            color: var(--text-dark);
        }

        .cart-wrapper.has-items {
            color: var(--dark-purple); /* Turns purple when items are added */
        }
        
        .cart-wrapper.has-items .cart-icon {
            color: var(--dark-purple);
        }

        /* --- SCROLLED HEADER STATE (The Morphing Magic) --- */
        header.scrolled .header-top {
            display: none; /* Hide the top section entirely */
        }

        header.scrolled .header-bottom {
            border-top: none;
            padding: 15px 40px;
        }

        /* Create a fake brand image inside the nav area when scrolled */
        .scrolled-brand {
            display: none;
            height: 30px;
            margin-right: 30px;
        }

        header.scrolled .scrolled-brand {
            display: block; /* Show brand on the left/middle-left */
        }
        
        header.scrolled .nav-links {
            margin-right: auto; /* Pushes nav to middle, leaving brand on left */
        }

        /* --- MAIN BODY STYLES --- */
        main {
            padding: 40px;
            max-width: 1400px;
            margin: auto;
        }

        h2.section-title {
            text-align: center;
            color: var(--dark-purple);
            font-size: 2rem;
            margin-bottom: 30px;
            margin-top: 50px;
            font-family: 'Playfair Display', serif; /* A touch of elegance */
        }

        /* 1. Scrolling Product Images Carousel */
        .carousel-container {
            width: 100%;
            overflow: hidden;
            position: relative;
            background: var(--white);
            border-radius: var(--border-radius);
            padding: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .carousel-track {
            display: flex;
            width: calc(300px * 20); /* Enough width for 10 images duplicated for infinite scroll */
            animation: scrollTrack 30s linear infinite;
        }
        
        .carousel-track:hover {
            animation-play-state: paused; /* Pause on hover */
        }

        .carousel-track img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin: 0 25px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        @keyframes scrollTrack {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-300px * 10)); } /* Scroll exactly half the track width */
        }

        /* 2. Video Section */
        .video-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .video-container video {
            width: 100%;
            display: block;
        }

        /* 3. Testimonial Carousel (Grand Textured Border) */
        .testimonial-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            /* Grand Textured Border Effect */
            border: 15px solid transparent;
            border-image: repeating-linear-gradient(45deg, var(--dark-purple), var(--dark-purple) 10px, var(--light-purple) 10px, var(--light-purple) 20px) 15;
            border-radius: 8px; /* Note: border-image often overrides border-radius in some browsers */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: var(--white);
        }

        .testimonial-slide {
            display: none;
            width: 100%;
        }

        .testimonial-slide.active {
            display: block;
            animation: fadeEffect 1s;
        }

        .testimonial-slide img {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes fadeEffect {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        /* --- FOOTER --- */
        footer {
            background-color: var(--white);
            color: var(--text-dark);
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background-color: #25D366; /* Official WhatsApp Green */
            color: white;
            border-radius: 50%;
            font-size: 1.8rem;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.4);
            transition: transform var(--transition-speed);
        }

        .whatsapp-link:hover {
            transform: scale(1.1);
        }

    </style>
</head>
<body>

    <header id="main-header">
        <!-- Top Section (Disappears on scroll) -->
        <div class="header-top">
            <div class="header-left">
                <img src="logo/logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/150x50?text=Logo'">
            </div>
            <div class="header-center">
                <img src="brand/brandname.jpg" alt="Company Name" onerror="this.src='https://via.placeholder.com/200x40?text=Brand+Name'">
            </div>
            <div class="header-right">
                <span id="datetime-display">Loading...</span>
            </div>
        </div>

        <!-- Bottom Section (Becomes sticky main nav on scroll) -->
        <div class="header-bottom">
            <!-- This image only shows when scrolled -->
            <img class="scrolled-brand" src="brand/brandname.jpg" alt="Company Name" onerror="this.src='https://via.placeholder.com/150x30?text=Brand'">
            
            <ul class="nav-links">
                <!-- 'active' class adds the glow/identifier -->
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="services.html">Other Services</a></li>
            </ul>

            <div class="action-icons">
                <div class="search-container" id="search-container">
                    <input type="text" class="search-input" id="search-input" placeholder="Search products...">
                    <i class="fas fa-search search-icon" onclick="toggleSearch()"></i>
                </div>
                <!-- Cart changes class to 'has-items' via JS when items are added -->
                <div class="cart-wrapper" id="cart-wrapper">
                    <i class="fas fa-shopping-cart cart-icon"></i>
                    (<span id="cart-count">0</span>)
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- 1. Auto Scrolling Images -->
        <h2 class="section-title">New Arrivals</h2>
        <div class="carousel-container">
            <div class="carousel-track" id="product-track">
                <!-- Images 1 to 10. We load them twice to create a seamless infinite scroll loop -->
                <img src="products/prod1.jpg" alt="Product 1" onerror="this.src='https://via.placeholder.com/250?text=Prod1'">
                <img src="products/prod2.jpg" alt="Product 2" onerror="this.src='https://via.placeholder.com/250?text=Prod2'">
                <img src="products/prod3.jpg" alt="Product 3" onerror="this.src='https://via.placeholder.com/250?text=Prod3'">
                <img src="products/prod4.jpg" alt="Product 4" onerror="this.src='https://via.placeholder.com/250?text=Prod4'">
                <img src="products/prod5.jpg" alt="Product 5" onerror="this.src='https://via.placeholder.com/250?text=Prod5'">
                <img src="products/prod6.jpg" alt="Product 6" onerror="this.src='https://via.placeholder.com/250?text=Prod6'">
                <img src="products/prod7.jpg" alt="Product 7" onerror="this.src='https://via.placeholder.com/250?text=Prod7'">
                <img src="products/prod8.jpg" alt="Product 8" onerror="this.src='https://via.placeholder.com/250?text=Prod8'">
                <img src="products/prod9.jpg" alt="Product 9" onerror="this.src='https://via.placeholder.com/250?text=Prod9'">
                <img src="products/prod10.jpg" alt="Product 10" onerror="this.src='https://via.placeholder.com/250?text=Prod10'">
                <!-- Duplicate for seamless loop -->
                <img src="products/prod1.jpg" alt="Product 1" onerror="this.src='https://via.placeholder.com/250?text=Prod1'">
                <img src="products/prod2.jpg" alt="Product 2" onerror="this.src='https://via.placeholder.com/250?text=Prod2'">
                <img src="products/prod3.jpg" alt="Product 3" onerror="this.src='https://via.placeholder.com/250?text=Prod3'">
                <img src="products/prod4.jpg" alt="Product 4" onerror="this.src='https://via.placeholder.com/250?text=Prod4'">
                <img src="products/prod5.jpg" alt="Product 5" onerror="this.src='https://via.placeholder.com/250?text=Prod5'">
                <img src="products/prod6.jpg" alt="Product 6" onerror="this.src='https://via.placeholder.com/250?text=Prod6'">
                <img src="products/prod7.jpg" alt="Product 7" onerror="this.src='https://via.placeholder.com/250?text=Prod7'">
                <img src="products/prod8.jpg" alt="Product 8" onerror="this.src='https://via.placeholder.com/250?text=Prod8'">
                <img src="products/prod9.jpg" alt="Product 9" onerror="this.src='https://via.placeholder.com/250?text=Prod9'">
                <img src="products/prod10.jpg" alt="Product 10" onerror="this.src='https://via.placeholder.com/250?text=Prod10'">
            </div>
        </div>

        <!-- 2. Video Tour -->
        <h2 class="section-title">Take a Tour</h2>
        <div class="video-container">
            <!-- 'controls' allows user to play/pause. 'muted' is often required for auto-play if you add it -->
            <video controls poster="https://via.placeholder.com/800x450?text=Video+Thumbnail">
                <source src="video/office_tour.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <!-- 3. Testimonial Slideshow -->
        <h2 class="section-title">What Our Clients Say</h2>
        <div class="testimonial-container" id="testimonial-slider">
            <div class="testimonial-slide active">
                <img src="test/test1.jpg" alt="Testimonial 1" onerror="this.src='https://via.placeholder.com/800x400?text=Testimonial+1'">
            </div>
            <div class="testimonial-slide">
                <img src="test/test2.jpg" alt="Testimonial 2" onerror="this.src='https://via.placeholder.com/800x400?text=Testimonial+2'">
            </div>
            <div class="testimonial-slide">
                <img src="test/test3.jpg" alt="Testimonial 3" onerror="this.src='https://via.placeholder.com/800x400?text=Testimonial+3'">
            </div>
        </div>
    </main>

    <footer>
        <div>&copy; <span id="current-year"></span> Chinzy Luxury Jeweries. All rights reserved.</div>
        <a href="https://wa.me/2349057835662" class="whatsapp-link" target="_blank" aria-label="Chat with us on WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>
    </footer>

    <script>
        // --- 1. Date and Time Update ---
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('datetime-display').innerText = now.toLocaleDateString('en-US', options);
            document.getElementById('current-year').innerText = now.getFullYear();
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // --- 2. Sticky Morphing Header Logic ---
        const header = document.getElementById('main-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 60) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // --- 3. Expandable Search ---
        function toggleSearch() {
            const container = document.getElementById('search-container');
            const input = document.getElementById('search-input');
            container.classList.toggle('active');
            if(container.classList.contains('active')){
                input.focus();
            }
        }

        // --- 4. Testimonial Slideshow Logic (Changes every 3 seconds) ---
        let slideIndex = 0;
        let slideInterval;

        function showSlides() {
            let slides = document.getElementsByClassName("testimonial-slide");
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].classList.add("active");  
            slideInterval = setTimeout(showSlides, 3000); // Change image every 3 seconds
        }
        
        // Start the slideshow
        showSlides();

        // Pause slideshow on hover (as requested)
        const sliderContainer = document.getElementById('testimonial-slider');
        sliderContainer.addEventListener('mouseenter', () => {
            clearTimeout(slideInterval);
        });
        sliderContainer.addEventListener('mouseleave', () => {
            slideInterval = setTimeout(showSlides, 3000);
        });

        // --- 5. Dummy Cart Logic (Just for demonstration on Home Page) ---
        // In the next step (building the Shop page), we will connect this to actual data
        function simulateAddToCart(qty) {
            const countSpan = document.getElementById('cart-count');
            const wrapper = document.getElementById('cart-wrapper');
            countSpan.innerText = qty;
            if(qty > 0) {
                wrapper.classList.add('has-items'); // Turns it purple
            } else {
                wrapper.classList.remove('has-items'); // Returns to black
            }
        }
    </script>
</body>
</html>
